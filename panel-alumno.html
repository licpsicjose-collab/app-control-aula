<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Alumno</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* Pantalla activa */
.pantalla {
    background: black;
    color: white;
    height: 100vh;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.parpadeo {
    font-size: 40px;
    animation: blink 1s infinite;
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
}
</style>
</head>

<body>

<div id="formulario">

<h2>Entrar a clase</h2>

<input id="nombre" placeholder="Nombre"><br>
<input id="grupo" placeholder="Grupo"><br>
<input id="codigo" placeholder="Código"><br><br>

<button onclick="entrar()">Entrar</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

// =============================
// VARIABLES
// =============================
let clase = null;
let docenteId = null;
let enClase = false;

let inicio = 0;
let tiempoFuera = 0;
let salidas = 0;
let salidaInicio = 0;

let nombreAlumno = "";

// =============================
// BUSCAR CLASE POR CÓDIGO
// =============================
async function buscarClasePorCodigo(codigoIngresado){

    let encontrada = null;
    let docenteEncontrado = null;

    let snap = await db.collectionGroup("claseActiva").get();

    snap.forEach(doc => {

        let data = doc.data();

        if (
            data.codigoInicial === codigoIngresado ||
            data.codigoRetardo === codigoIngresado
        ) {
            encontrada = data;
            docenteEncontrado = doc.ref.parent.parent.id;
        }

    });

    if (encontrada) {
        clase = encontrada;
        docenteId = docenteEncontrado;
        escucharClase();
        return true;
    } else {
        return false;
    }
}

// =============================
// ESCUCHAR CLASE EN TIEMPO REAL
// =============================
function escucharClase(){

    db.collection("docentes")
    .doc(docenteId)
    .collection("claseActiva")
    .doc("activo")
    .onSnapshot(doc => {

        let data = doc.data();

        if (!data && enClase) {
            enClase = false;

            document.body.innerHTML = `
            <div class="pantalla">
                <h2>✅ Clase finalizada</h2>
                <p>Puedes cerrar esta pantalla</p>
            </div>
            `;
            return;
        }

        clase = data;
    });
}

// =============================
// ENTRAR A CLASE
// =============================
async function entrar(){

    let n = nombre.value;
    let g = grupo.value;
    let c = codigo.value;

    let existe = await buscarClasePorCodigo(c);

    if (!existe) {
        alert("Código incorrecto o clase inexistente");
        return;
    }

    let valido =
        c === clase.codigoInicial ||
        c === clase.codigoRetardo;

    if (!valido) {
        alert("Código incorrecto");
        return;
    }

    let tardanza = Date.now() - clase.inicio;

    enClase = true;
    inicio = Date.now();
    nombreAlumno = n;

    // Pantalla activa
    document.body.innerHTML = `
    <div class="pantalla">
        <h2>📵 Estás en clase</h2>
        <p>No uses el teléfono</p>
        <div class="parpadeo">🔴</div>
    </div>
    `;

    // Guardar alumno en SU docente
    db.collection("docentes")
    .doc(docenteId)
    .collection("claseActiva")
    .doc("activo")
    .collection("alumnos")
    .doc(n)
    .set({
        nombre: n,
        grupo: g,
        tiempo: 0,
        salidas: 0,
        tardanza: tardanza,
        retardoManual: (c === clase.codigoRetardo)
    });
}

// =============================
// DETECCIÓN SALIDAS
// =============================
window.addEventListener("blur", () => {

    if (!enClase || clase?.pausada) return;

    salidas++;
    salidaInicio = Date.now();
});

window.addEventListener("focus", () => {

    if (!enClase) return;

    let tiempoSalida = Date.now() - salidaInicio;

    if (tiempoSalida > 20000) {
        tiempoFuera += tiempoSalida;
    }

    salidaInicio = 0;
});

// =============================
// GUARDADO CONTINUO
// =============================
setInterval(() => {

    if (!enClase) return;

    let tiempoTotal = Date.now() - inicio;
    let tiempoEnApp = tiempoTotal - tiempoFuera;

    if (clase?.pausada) {
        tiempoEnApp = tiempoTotal;
    }

    db.collection("docentes")
    .doc(docenteId)
    .collection("claseActiva")
    .doc("activo")
    .collection("alumnos")
    .doc(nombreAlumno)
    .update({
        tiempo: tiempoEnApp,
        salidas: salidas
    });

}, 5000);

</script>

</body>
</html>
