<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Docente</title>
</head>

<body>

<h1>Panel Docente</h1>

<input id="escuela" placeholder="Escuela"><br>
<input id="grupo" placeholder="Grupo"><br>
<input id="materia" placeholder="Materia"><br><br>

<button onclick="iniciarClase()">Iniciar Clase</button>
<button onclick="modoRetardo()">Activar Retardos</button>

<h2>Clase</h2>
<div id="clase"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

// generar código
function generarCodigo() {
    return Math.random().toString(36).substring(2,6).toUpperCase();
}

// iniciar clase
function iniciarClase() {

    let escuela = document.getElementById("escuela").value;
    let grupo = document.getElementById("grupo").value;
    let materia = document.getElementById("materia").value;

    let clase = {
        escuela,
        grupo,
        materia,

        codigoInicial: generarCodigo(),
        codigoRetardo: generarCodigo(),

        modo: "normal",
        inicio: Date.now()
    };

    db.collection("clases").doc("activa").set(clase);
}

// activar retardo
function modoRetardo() {

    db.collection("clases")
    .doc("activa")
    .update({
        modo: "retardo"
    });
}

// mostrar clase
db.collection("clases").doc("activa")
.onSnapshot(doc => {

    let c = doc.data();
    if (!c) return;

    let codigo = c.modo === "normal"
        ? c.codigoInicial
        : c.codigoRetardo;

    document.getElementById("clase").innerHTML = `
        ${c.escuela} - ${c.grupo}<br>
        Código activo: <strong>${codigo}</strong><br>
        Modo: ${c.modo}
    `;
});

</script>

</body>
</html>
