<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alumno</title>
</head>

<body>

<h1>Entrar a clase</h1>

<input id="nombre" placeholder="Nombre"><br>
<input id="grupo" placeholder="Grupo"><br>
<input id="codigo" placeholder="Código"><br><br>

<button onclick="entrar()">Entrar</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

let claseActual;

db.collection("clases").doc("activa")
.onSnapshot(doc => {
    claseActual = doc.data();
});

function entrar() {

    let nombre = document.getElementById("nombre").value;
    let grupo = document.getElementById("grupo").value;
    let codigo = document.getElementById("codigo").value;

    if (!claseActual) {
        alert("No hay clase");
        return;
    }

    // ✅ VALIDAR DOBLE CÓDIGO
    let valido =
        codigo === claseActual.codigoInicial ||
        codigo === claseActual.codigoRetardo;

    if (!valido) {
        alert("Código incorrecto");
        return;
    }

    let horaEntrada = Date.now();

    let tardanza = horaEntrada - claseActual.inicio;

    // ✅ DETECTAR SI ENTRÓ POR RETARDO
    let retardoManual = (codigo === claseActual.codigoRetardo);

    db.collection("clases")
    .doc("activa")
    .collection("alumnos")
    .doc(nombre)
    .set({
        nombre,
        grupo,
        tiempo: 0,
        salidas: 0,

        tardanza: tardanza,
        retardoManual: retardoManual
    });

    alert("Entrada registrada ✅");
}

</script>

</body>
</html>
