<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Docente</title>
</head>

<body>

<h1>Panel Docente</h1>

<h2>Crear Clase</h2>

<input id="escuela" placeholder="Escuela"><br>
<input id="grupo" placeholder="Grupo"><br>
<input id="materia" placeholder="Materia"><br><br>

<button onclick="iniciarClase()">Iniciar Clase</button>

<h2>Clase Activa</h2>
<div id="clase"></div>

<h2>Alumnos en clase</h2>
<div id="alumnos"></div>

<!-- ✅ FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.jsscript>
<script src="firebase.js"></script>

<script>

// ✅ GENERAR CÓDIGO
function generarCodigo() {
    return Math.random().toString(36).substring(2,6).toUpperCase();
}

// ✅ INICIAR CLASE
function iniciarClase() {

    let escuela = document.getElementById("escuela").value;
    let grupo = document.getElementById("grupo").value;
    let materia = document.getElementById("materia").value;

    if (!escuela || !grupo || !materia) {
        alert("Completa todos los campos");
        return;
    }

    let clase = {
        escuela,
        grupo,
        materia,
        codigo: generarCodigo(),
        activa: true,
        inicio: Date.now()
    };

    db.collection("clases").doc("activa").set(clase);
}

// ✅ ESCUCHAR CLASE
db.collection("clases").doc("activa")
.onSnapshot((doc) => {

    let clase = doc.data();

    if (clase) {
        document.getElementById("clase").innerHTML = `
            Escuela: ${clase.escuela}<br>
            Grupo: ${clase.grupo}<br>
            Materia: ${clase.materia}<br>
            Código: <strong>${clase.codigo}</strong>
        `;
    }

});

// ✅ ESCUCHAR ALUMNOS
db.collection("clases")
.doc("activa")
.collection("alumnos")
.onSnapshot((snapshot) => {

    let html = "";

    snapshot.forEach((doc) => {
        let a = doc.data();

        html += `
        <div>
            ${a.nombre} - ${a.grupo}
        </div>
        `;
    });

    if (html === "") {
        html = "Sin alumnos";
    }

    document.getElementById("alumnos").innerHTML = html;
});

</script>

</body>
</html>
