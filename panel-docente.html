<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Docente</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding-top: 40px;
}

input, button {
    padding: 10px;
    margin: 5px;
}

.alumno {
    border: 1px solid #ccc;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}
</style>

</head>

<body>

<h1>Panel Docente</h1>

<h2>Crear Clase</h2>

<input id="escuela" placeholder="Escuela"><br>
<input id="grupo" placeholder="Grupo"><br>
<input id="materia" placeholder="Materia"><br><br>

<button onclick="iniciarClase()">Iniciar Clase</button>

<h2>Clase Activa</h2>
<div id="clase"></div>

<h2>Alumnos en clase</h2>
<div id="alumnos">Sin alumnos</div>

<!-- ✅ FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

// ✅ GENERAR CÓDIGO
function generarCodigo() {
    return Math.random().toString(36).substring(2,6).toUpperCase();
}

// ✅ INICIAR CLASE
function iniciarClase() {

    let escuela = document.getElementById("escuela").value;
    let grupo = document.getElementById("grupo").value;
    let materia = document.getElementById("materia").value;

    if (!escuela || !grupo || !materia) {
        alert("Completa todos los campos");
        return;
    }

    let clase = {
        escuela: escuela,
        grupo: grupo,
        materia: materia,
        codigo: generarCodigo(),
        inicio: Date.now()
    };

    db.collection("clases").doc("activa").set(clase);
}

// ✅ MOSTRAR CLASE
db.collection("clases").doc("activa")
.onSnapshot(doc => {

    let c = doc.data();
    if (!c) return;

    document.getElementById("clase").innerHTML = `
        🏫 ${c.escuela}<br>
        👥 ${c.grupo}<br>
        📘 ${c.materia}<br>
        🔑 Código: <strong>${c.codigo}</strong>
    `;
});

// ✅ MOSTRAR ALUMNOS CON DATOS
db.collection("clases")
.doc("activa")
.collection("alumnos")
.onSnapshot(snapshot => {

    let html = "";

    snapshot.forEach(doc => {

        let a = doc.data();

        // convertir milisegundos a segundos
        let tiempoSeg = Math.floor((a.tiempo || 0) / 1000);

        html += `
        <div class="alumno">
            👤 <strong>${a.nombre}</strong><br>
            📚 Grupo: ${a.grupo}<br>
            ⏱ Tiempo en app: ${tiempoSeg} segundos<br>
            🚫 Salidas: ${a.salidas || 0}
        </div>
        `;
    });

    document.getElementById("alumnos").innerHTML = html || "Sin alumnos";
});

</script>

</body>
</html>
