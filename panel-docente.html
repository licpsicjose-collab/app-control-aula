<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Docente</title>

<style>
body {
    font-family: Arial;
    text-align: center;
}
input, button {
    padding: 10px;
    margin: 5px;
}
</style>

</head>

<body>

<h1>Panel Docente</h1>

<input id="escuela" placeholder="Escuela"><br>
<input id="grupo" placeholder="Grupo"><br>
<input id="materia" placeholder="Materia"><br><br>

<button onclick="iniciarClase()">Iniciar Clase</button>

<h2>Clase</h2>
<div id="clase"></div>

<!-- ✅ Firebase (BIEN ORDENADO Y SIN DUPLICAR) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDRjBwW6nueplRNYL-S0sxfliC8taWNZCM",
  authDomain: "app-clase-3a564.firebaseapp.com",
  projectId: "app-clase-3a564"
};

// ✅ INICIAR FIREBASE UNA SOLA VEZ
firebase.initializeApp(firebaseConfig);

// ✅ BASE DE DATOS
const db = firebase.firestore();

// ✅ FUNCIÓN QUE DEBE FUNCIONAR SI O SI
function iniciarClase(){

    alert("✅ botón funcionando");

    let escuela = document.getElementById("escuela").value;
    let grupo = document.getElementById("grupo").value;
    let materia = document.getElementById("materia").value;

    let claseData = {
        escuela,
        grupo,
        materia,
        codigo: Math.random().toString(36).substring(2,6).toUpperCase(),
        inicio: Date.now()
    };

    db.collection("clases")
      .doc("activa")
      .set(claseData)
      .then(() => {
          alert("✅ Clase creada correctamente");
      })
      .catch(err => {
          alert("❌ Error: " + err.message);
          console.error(err);
      });
}

// ✅ ESCUCHAR CLASE
db.collection("clases")
.doc("activa")
.onSnapshot(doc => {

    let c = doc.data();

    if(!c){
        document.getElementById("clase").innerHTML = "Sin clase";
        return;
    }

    document.getElementById("clase").innerHTML = `
        ${c.escuela}<br>
        ${c.grupo}<br>
        ${c.materia}<br>
        🔑 ${c.codigo}
    `;
});

</script>

</body>
</html>
