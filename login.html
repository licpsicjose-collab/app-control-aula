<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login Docente</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 50px;
}
input, button {
    padding: 10px;
    margin: 5px;
}
</style>
</head>

<body>

<h2>Login Docente</h2>

<input id="email" placeholder="Correo"><br>
<input id="password" type="password" placeholder="Contraseña"><br><br>

<button onclick="login()">Entrar</button>
<button onclick="registro()">Registrarse</button>

<p id="msg"></p>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase.js"></script>

<script>
function login(){
    let email = emailInput.value;
    let pass = password.value;

    auth.signInWithEmailAndPassword(email, pass)
    .then(()=>{
        location.href="panel-docente.html";
    })
    .catch(e=>msg.innerText=e.message);
}

function registro(){
    let email = emailInput.value;
    let pass = password.value;

    auth.createUserWithEmailAndPassword(email, pass)
    .then(()=>msg.innerText="Usuario creado")
    .catch(e=>msg.innerText=e.message);
}
</script>

</body>
</html>
