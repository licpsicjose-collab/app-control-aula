<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zona de Clase - Alumno</title>

<!-- ✅ V7.4 — PWA: manifest, favicon e íconos (no afecta lógica ni Firebase) -->
<link rel="manifest" href="manifest-alumno.json">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="icons/favicon-48.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180.png">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zona de Clase">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #000000;
    color: #ffffff;
    overflow: hidden;
}

.pantalla-login {
    background: #111827;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
}

.form-box {
    background: #1f2937;
    padding: 30px;
    border-radius: 12px;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.form-box h2 {
    margin-top: 0;
    margin-bottom: 20px;
    text-align: center;
    color: #3b82f6;
    font-size: 22px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border: 1px solid #4b5563;
    border-radius: 6px;
    background: #374151;
    color: white;
    font-size: 16px;
    box-sizing: border-box;
}

input:focus {
    outline: none;
    border-color: #3b82f6;
}

button {
    width: 100%;
    padding: 14px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
}

button:hover {
    background: #2563eb;
}

/* Pantalla de bloqueo en clase */
.pantalla-clase {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

.parpadeo {
    font-size: 50px;
    animation: blink 1.5s infinite;
    margin: 20px 0;
}

.marcador-estrellas {
    font-size: 24px;
    background: #1e1b4b;
    border: 2px solid #4338ca;
    padding: 10px 20px;
    border-radius: 50px;
    margin-top: 20px;
    color: #f59e0b;
    font-weight: bold;
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.2; }
    100% { opacity: 1; }
}

/* ✅ MEJORA 2: Pantalla visible cuando la clase está pausada */
.pantalla-pausada {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

.pantalla-pausada h2 {
    color: #f59e0b;
    font-size: 30px;
    margin: 0 0 10px 0;
}

.icono-pausa {
    font-size: 50px;
    margin: 10px 0;
}

/* ✅ MEJORA 7: Evaluación visible para el alumno */
.marcador-evaluacion {
    font-size: 22px;
    background: #1e1b4b;
    border: 2px solid #4338ca;
    padding: 10px 20px;
    border-radius: 50px;
    margin-top: 14px;
    color: #ffffff;
    font-weight: bold;
}
</style>
</head>
<body>

<div id="vista-app">
    </div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>
let clase = null;
let enClase = false;

let inicio = 0;
let tiempoFuera = 0;
let salidas = 0;
let salidaInicio = 0;

let nombreAlumno = "";
let grupoAlumno = "";
let documentoAlumnoId = "";
let targetDocenteUid = "";
let unsubscribeClaseAlumno = null;
let unsubscribeEstrellas = null;
let pausadaAnterior = false; // ✅ MEJORA 2: control para detectar transición de pausa

// Pintar formulario inicial
mostrarFormulario();

// ✅ REENGANCHE AUTOMÁTICO: Revisa si el alumno ya estaba en clase activa antes de que se apagara el cel
comprobarSesionExistente();

function mostrarFormulario() {
    document.getElementById("vista-app").innerHTML = `
        <div class="pantalla-login">
            <div class="form-box">
                <h2>Entrar a Clase</h2>
                <input id="idDocente" placeholder="Código Docente (5 letras)">
                <input id="nombre" placeholder="Tu Nombre Completo">
                <div style="font-size:12px; color:#9ca3af; margin:-6px 0 12px 2px;">
                    Formato sugerido: No. Lista + Primer Apellido + Nombre(s)<br>
                    Ej. 05 Perez Juan, 12 Garcia Maria Fernanda
                </div>
                <input id="grupo" placeholder="Tu Grupo (Ej: 3-A)">
                <input id="codigo" placeholder="Código de Acceso de la Sesión">
                <button onclick="entrar()">Conectar</button>
            </div>
        </div>
    `;
}

function comprobarSesionExistente() {
    let sesionGuardada = localStorage.getItem("sesion_clase_activa");
    if (sesionGuardada) {
        let datos = JSON.parse(sesionGuardada);
        // Verificar si la clase sigue existiendo en el servidor de manera fresca
        db.collection("clases").doc(datos.targetId).get({ source: "server" })
        .then(doc => {
            if (doc.exists) {
                // Sigue activa, reconectar de inmediato
                targetDocenteUid = datos.targetId;
                nombreAlumno = datos.nombre;
                grupoAlumno = datos.grupo;
                documentoAlumnoId = datos.docId;
                inicio = datos.inicio;
                tiempoFuera = datos.tiempoFuera || 0;
                salidas = datos.salidas || 0;
                enClase = true;

                activarPantallaBloqueo();
                escucharClaseMaestro(targetDocenteUid);
                escucharEstrellasTiempoReal();
            } else {
                // La clase ya caducó en el servidor, limpiar memoria
                localStorage.removeItem("sesion_clase_activa");
            }
        }).catch(() => {
            localStorage.removeItem("sesion_clase_activa");
        });
    }
}

function escucharClaseMaestro(docenteId) {
    if(unsubscribeClaseAlumno) unsubscribeClaseAlumno();

    unsubscribeClaseAlumno = db.collection("clases").doc(docenteId)
    .onSnapshot(doc => {
        let data = doc.data();
        if (!data && enClase) {
            enClase = false;
            reportarAFirebase();
            localStorage.removeItem("sesion_clase_activa");
            if(unsubscribeEstrellas) unsubscribeEstrellas();
            
            document.getElementById("vista-app").innerHTML = `
                <div class="pantalla-clase">
                    <h2>✅ Clase Finalizada</h2>
                    <p style="color: #9ca3af;">El profesor ha cerrado la sesión. Tus métricas se guardaron.</p>
                </div>
            `;
            return;
        }
        clase = data;

        // ✅ MEJORA 2: Alternar pantalla de pausa solo cuando cambia el estado
        if (enClase) {
            let pausadaActual = !!data?.pausada;
            if (pausadaActual !== pausadaAnterior) {
                pausadaAnterior = pausadaActual;
                if (pausadaActual) {
                    activarPantallaPausa();
                } else {
                    activarPantallaBloqueo();
                    escucharEstrellasTiempoReal();
                }
            }
        }
    });
}

// ✅ SECCIÓN 8: Escuchar las estrellas del alumno en tiempo real sin gastar más datos
function escucharEstrellasTiempoReal() {
    if(unsubscribeEstrellas) unsubscribeEstrellas();
    
    unsubscribeEstrellas = db.collection("clases").doc(targetDocenteUid)
    .collection("alumnos").doc(documentoAlumnoId)
    .onSnapshot(doc => {
        let data = doc.data();
        if(data) {
            let numEstrellas = data.participaciones || 0;
            let estrellasVisuales = "⭐".repeat(numEstrellas) || "Ninguna aún";
            let el = document.getElementById("contador-estrellas-visual");
            if(el) {
                el.innerHTML = `Mis Participaciones:<br><span style="font-size:28px;">${estrellasVisuales}</span>`;
            }

            // ✅ MEJORA 7: Actualiza evaluación en tiempo real
            let elEval = document.getElementById("evaluacion-visual");
            if(elEval) {
                elEval.innerHTML = textoEvaluacion(data.estado);
            }
        }
    });
}

async function entrar(){
    let codigoCorto = document.getElementById("idDocente").value.trim().toUpperCase();
    let n = document.getElementById("nombre").value.trim();
    let g = document.getElementById("grupo").value.trim();
    let c = document.getElementById("codigo").value.trim();

    if(!codigoCorto || !n || !g || !c) {
        alert("Por favor completa todos los campos.");
        return;
    }

    // ✅ SOLUCIÓN iPHONE: Forzar petición limpia al servidor saltándose la caché agresiva
    try {
        let mapeoRef = await db.collection("mapeo_codigos").doc(codigoCorto).get({ source: "server" });
        if(!mapeoRef.exists) {
            alert("El Código Docente no es válido.");
            return;
        }

        let targetId = mapeoRef.data().docenteUid;
        let docRef = await db.collection("clases").doc(targetId).get({ source: "server" });
        let claseData = docRef.data();

        if (!claseData){
            alert("El docente no tiene ninguna clase activa en este momento.");
            return;
        }

        // ✅ MEJORA 1: Retardos reales. En modo normal solo vale el código normal;
        // en modo retardo solo vale el código de retardo.
        let modoActual = claseData.modo || "normal";
        let valido = (modoActual === "retardo")
            ? (c === claseData.codigoRetardo)
            : (c === claseData.codigoInicial);
        if (!valido){
            alert("Código de acceso de sesión incorrecto.");
            return;
        }

        targetDocenteUid = targetId;
        clase = claseData;
        
        enClase = true;
        inicio = Date.now();
        nombreAlumno = n;
        grupoAlumno = g;
        
        // ✅ CONTROL ANTI-DUPLICADOS: Combina Nombre y Grupo en el ID de documento
        documentoAlumnoId = `${n}_${g}`.replace(/\s+/g, '_'); 

        let tardanza = Date.now() - clase.inicio;

        // Guardar estado local para prevenir cierres por botón de suspensión
        localStorage.setItem("sesion_clase_activa", JSON.stringify({
            targetId: targetDocenteUid,
            nombre: n,
            grupo: g,
            docId: documentoAlumnoId,
            inicio: inicio
        }));

        activarPantallaBloqueo();
        escucharClaseMaestro(targetDocenteUid);
        escucharEstrellasTiempoReal();

        // Registro de entrada inicial
        db.collection("clases")
        .doc(targetDocenteUid)
        .collection("alumnos")
        .doc(documentoAlumnoId)
        .set({
            nombre: n,
            grupo: g,
            tiempo: 0,
            tiempoFuera: 0,
            salidas: 0,
            participaciones: 0,
            tardanza: tardanza,
            retardoManual: (c === clase.codigoRetardo),
            ultimaActualizacion: Date.now()
        });

    } catch(err) {
        alert("Error de conexión. Revisa tus datos móviles.");
    }
}

// ✅ MEJORA 2: Pantalla visible de "CLASE PAUSADA"
function activarPantallaPausa() {
    document.getElementById("vista-app").innerHTML = `
        <div class="pantalla-pausada">
            <div class="icono-pausa">⏸️</div>
            <h2>CLASE PAUSADA</h2>
            <p style="color:#9ca3af; font-size:14px;">El profesor pausó la sesión. No se está contando tiempo ni salidas.</p>
        </div>
    `;
}

function activarPantallaBloqueo() {
    document.getElementById("vista-app").innerHTML = `
        <div class="pantalla-clase">
            <h2 style="color:#ef4444; margin:0;">📵 Modo de Atención Activo</h2>
            <p style="color:#9ca3af; font-size:14px;">No salgas de esta pantalla ni bloquees el teléfono</p>
            <div class="parpadeo">🔴</div>
            <div id="contador-estrellas-visual" class="marcador-estrellas">
                Mis Participaciones:<br>Ninguna aún
            </div>
            <div id="evaluacion-visual" class="marcador-evaluacion">
                Sin evaluación
            </div>
        </div>
    `;
}

// ✅ MITIGACIÓN XSS (V7.3): escapa el valor antes de insertarlo como HTML,
// por si "estado" llegara a contener marcado o script (defensa en profundidad,
// aunque hoy el docente solo asigna uno de 4 valores fijos).
function escaparHTML(texto) {
    if (texto === undefined || texto === null) return "";
    return String(texto)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

// ✅ MEJORA 7: El campo "estado" ya se guarda con emoji y texto (ej. "😄 Excelente")
function textoEvaluacion(estado) {
    return estado ? escaparHTML(estado) : "Sin evaluación";
}

function reportarAFirebase() {
    if (!enClase || !targetDocenteUid) return;

    let tiempoTotal = Date.now() - inicio;
    let tiempoEnApp = tiempoTotal - tiempoFuera;

    if (clase?.pausada){
        tiempoEnApp = tiempoTotal;
    }

    db.collection("clases")
    .doc(targetDocenteUid)
    .collection("alumnos")
    .doc(documentoAlumnoId)
    .update({
        tiempo: tiempoEnApp,
        tiempoFuera: tiempoFuera,
        salidas: salidas,
        ultimaActualizacion: Date.now()
    }).catch(() => {});
}

// ===== DETECCIONES MEJORADAS (ANTI-FALSOS POSITIVOS DE 45 SEG) =====
window.addEventListener("blur", () => {
    if (!enClase || clase?.pausada) return;
    salidaInicio = Date.now();
});

window.addEventListener("focus", () => {
    if (!enClase || !salidaInicio) return;
    let tiempoSalida = Date.now() - salidaInicio;
    
    // ✅ TOLERANCIA PEDAGÓGICA: Solo penaliza si estuvo fuera más de 5 segundos reales
    if (tiempoSalida > 5000){
        salidas++;
        tiempoFuera += tiempoSalida;
        reportarAFirebase();
    }
    salidaInicio = 0;
});

document.addEventListener("visibilitychange", () => {
    if (!enClase || clase?.pausada) return;

    if (document.visibilityState === "hidden") {
        salidaInicio = Date.now();
    } else {
        if (!salidaInicio) return;
        let tiempoSalida = Date.now() - salidaInicio;
        
        if (tiempoSalida > 5000){
            salidas++;
            tiempoFuera += tiempoSalida;
            reportarAFirebase();
        }
        salidaInicio = 0;
    }
});

// Respaldo preventivo lento cada 60 segundos (Ahorro radical de batería y dinero)
setInterval(() => {
    if(enClase && salidaInicio === 0) {
        reportarAFirebase();
    }
}, 60000);

</script>
</body>
</html>
