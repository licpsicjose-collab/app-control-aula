<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Docente</title>

<style>
body {
    font-family: Arial;
    text-align: center;
}
input, button {
    padding: 10px;
    margin: 5px;
}
</style>

</head>

<body>

<h1>Panel Docente</h1>

<button onclick="salir()">Cerrar sesión</button>

<br><br>

<input id="escuela" placeholder="Escuela"><br>
<input id="grupo" placeholder="Grupo"><br>
<input id="materia" placeholder="Materia"><br><br>

<button onclick="iniciarClase()">Iniciar Clase</button>

<h2>Clase</h2>
<div id="clase"></div>

<!-- ✅ FIREBASE SOLO UNA VEZ, BIEN CARGADO -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>

// ✅ CONFIGURACIÓN (directo aquí, sin firebase.js para evitar conflictos)
const firebaseConfig = {
  apiKey: "AIzaSyDRjBwW6nueplRNYL-S0sxfliC8taWNZCM",
  authDomain: "app-clase-3a564.firebaseapp.com",
  projectId: "app-clase-3a564"
};

// ✅ INICIALIZAR UNA SOLA VEZ
firebase.initializeApp(firebaseConfig);

// ✅ SERVICIOS
const db = firebase.firestore();
const auth = firebase.auth();

// ✅ VALIDAR LOGIN
auth.onAuthStateChanged(user => {

    if (!user){
        alert("Debes iniciar sesión");
        window.location.href = "login.html";
        return;
    }

    console.log("Usuario:", user.email);
});

// ✅ CERRAR SESIÓN
function salir(){
    auth.signOut().then(()=>{
        window.location.href = "login.html";
    });
}

// ✅ GENERAR CÓDIGO
function generarCodigo(){
    return Math.random().toString(36).substring(2,6).toUpperCase();
}

// ✅ ESTA FUNCIÓN YA NO SE ROMPE
function iniciarClase(){

    console.log("✅ iniciarClase ejecutándose");

    let claseData = {
        escuela: document.getElementById("escuela").value,
        grupo: document.getElementById("grupo").value,
        materia: document.getElementById("materia").value,
        codigo: generarCodigo(),
        inicio: Date.now()
    };

    db.collection("clases").doc("activa").set(claseData);
}

// ✅ MOSTRAR CLASE
db.collection("clases").doc("activa")
.onSnapshot(doc => {

    let c = doc.data();

    if (!c){
        document.getElementById("clase").innerHTML = "Sin clase activa";
        return;
    }

    document.getElementById("clase").innerHTML = `
        ${c.escuela}<br>
        ${c.grupo}<br>
        ${c.materia}<br>
        🔑 ${c.codigo}
    `;
});

</script>

</body>
</html>
