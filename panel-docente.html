<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Docente - Control Aula</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        input, button {
            padding: 12px;
            margin: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        input { width: 80%; max-width: 300px; }
        button {
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { opacity: 0.9; }
        .btn-principal { background-color: #007bff; color: white; border: none; }
        .btn-peligro { background-color: #dc3545; color: white; border: none; }
        .btn-advertencia { background-color: #ffc107; color: #212529; border: none; }
        .alumno {
            border: 1px solid #e0e0e0;
            margin: 15px 0;
            padding: 15px;
            border-radius: 8px;
            background: #fafafa;
            text-align: left;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .pausa { background-color: #ff9800; color: white; border: none; width: 150px; }
        .reanudar { background-color: #4caf50; color: white; border: none; width: 150px; }
        .grid-alumnos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏫 Panel Docente</h1>

    <!-- Sección de configuración de clase -->
    <div>
        <input id="escuela" placeholder="Nombre de la Escuela"><br>
        <input id="grupo" placeholder="Grupo (Ej. 3°A)"><br>
        <input id="materia" placeholder="Asignatura / Materia"><br><br>

        <button class="btn-principal" onclick="iniciarClase()">Iniciar Clase</button>
        <button class="btn-advertencia" onclick="activarRetardo()">Modo Retardos</button>
        <button class="btn-principal" style="background-color: #28a745;" onclick="exportarCSV()">Exportar Excel (CSV)</button>
        <button class="btn-peligro" onclick="finalizarClase()">Finalizar Clase</button>
        <button class="btn-peligro" style="background-color: #6c757d;" onclick="confirmarBorrado()">🗑 Borrar Historial</button>
    </div>

    <hr>

    <h2>📢 Clase Activa</h2>
    <div id="clase">Sin clase activa</div>
    <div id="controlPausa" style="margin-top: 10px;"></div>

    <hr>

    <h2>🔍 Buscar Alumno</h2>
    <input id="busqueda" placeholder="Escribe el nombre..." onkeyup="filtrar()">

    <h2>👥 Alumnos en la Sesión</h2>
    <div id="alumnos" class="grid-alumnos"></div>

    <hr>

    <h2>📜 Historial de Clases</h2>
    <div id="historial"></div>
</div>

<!-- ✅ SDK DE FIREBASE (Modo Compatibilidad v9/v10) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>
// Lista en memoria para búsquedas reactivas rápidas
let listaAlumnos = [];

// Generador de códigos aleatorios alfanuméricos cortos
function generarCodigo(){
    return Math.random().toString(36).substring(2,6).toUpperCase();
}

// ✅ INICIAR CLASE
function iniciarClase(){
    const escuela = document.getElementById("escuela").value.trim();
    const grupo = document.getElementById("grupo").value.trim();
    const materia = document.getElementById("materia").value.trim();

    if(!escuela || !grupo || !materia){
        alert("⚠️ Por favor, llena todos los campos antes de iniciar la clase.");
        return;
    }

    const clase = {
        escuela: escuela,
        grupo: grupo,
        materia: materia,
        codigoInicial: generarCodigo(),
        codigoRetardo: generarCodigo(),
        modo: "normal",
        pausada: false,
        inicio: Date.now()
    };

    db.collection("clases").doc("activa").set(clase)
      .then(() => alert("🚀 Clase guardada e iniciada en Firebase"))
      .catch(err => console.error("Error al iniciar clase: ", err));
}

// ✅ ACTIVAR MODO RETARDOS
function activarRetardo(){
    db.collection("clases").doc("activa").update({
        modo: "retardo"
    }).then(() => alert("⏰ Modo de registro cambiado a RETARDOS"));
}

// ✅ CONMUTADOR DE PAUSA (Toggle)
function togglePausa(){
    const ref = db.collection("clases").doc("activa");
    ref.get().then(doc => {
        if(doc.exists){
            ref.update({ pausada: !doc.data().pausada });
        }
    });
}

// ✅ ESCUCHA EN TIEMPO REAL: CLASE ACTIVA
db.collection("clases").doc("activa").onSnapshot(doc => {
    const c = doc.data();

    if (!c){
        document.getElementById("clase").innerHTML = "<em>No hay ninguna clase activa en este momento.</em>";
        document.getElementById("controlPausa").innerHTML = "";
        return;
    }

    const codigoActual = c.modo === "normal" ? c.codigoInicial : c.codigoRetardo;

    document.getElementById("clase").innerHTML = `
        <div style="font-size: 16px; line-height: 1.6;">
            🏢 <strong>Escuela:</strong> ${c.escuela}<br>
            👥 <strong>Grupo:</strong> ${c.grupo}<br>
            📘 <strong>Materia:</strong> ${c.materia}<br>
            🔑 <span style="font-size: 20px; color: #007bff;"><strong>${codigoActual}</strong></span> (Código de Acceso)<br>
            ⚙️ <strong>Modo Actual:</strong> <span style="text-transform: uppercase; font-weight: bold;">${c.modo}</span>
        </div>
    `;

    document.getElementById("controlPausa").innerHTML = `
        <button class="${c.pausada ? 'reanudar' : 'pausa'}" onclick="togglePausa()">
            ${c.pausada ? '▶️ Reanudar Clase' : '⏸ Pausar Clase'}
        </button>
    `;
});

// ✅ ESCUCHA EN TIEMPO REAL: SUBCOLECCIÓN DE ALUMNOS
db.collection("clases").doc("activa").collection("alumnos")
.onSnapshot(snap => {
    listaAlumnos = [];
    snap.forEach(doc => {
        // Vinculamos el ID del documento para modificaciones directas individuales
        listaAlumnos.push({ id: doc.id, ...doc.data() });
    });
    render(listaAlumnos);
});

// ✅ FILTRO DE BÚSQUEDA DINÁMICO
function filtrar(){
    const texto = document.getElementById("busqueda").value.toLowerCase();
    const filtrados = listaAlumnos.filter(a => 
        (a.nombre || "").toLowerCase().includes(texto)
    );
    render(filtrados);
}

// ✅ ASIGNAR EVALUACIÓN DE DESEMPEÑO (Emojis)
function setEstado(idDocumento, estado){
    db.collection("clases").doc("activa").collection("alumnos").doc(idDocumento)
    .update({ estado: estado })
    .catch(err => console.error("Error al actualizar estado del alumno: ", err));
}

// ✅ RENDERIZADO OPTIMIZADO DE TARJETAS DE ALUMNOS
function render(data){
    const contenedor = document.getElementById("alumnos");
    
    if(data.length === 0){
        contenedor.innerHTML = "<p style='grid-column: 1/-1; color: #777;'>Ningún alumno registrado en esta sesión.</p>";
        return;
    }

    const fragmento = data.map(a => {
        const t = Math.floor((a.tiempo || 0) / 1000);
        const min = Math.floor(t / 60);
        const seg = t % 60;
        const tiempoFormateado = min > 0 ? `${min}m ${seg}s` : `${seg}s`;

        const tardanzaSeg = Math.floor((a.tardanza || 0) / 1000);
        const tardanzaFormateada = tardanzaSeg < 60 
            ? "<span style='color: green;'>✅ A tiempo</span>" 
            : `<span style='color: red;'>⏰ Retardo: ${Math.floor(tardanzaSeg / 60)}m ${tardanzaSeg % 60}s</span>`;

        return `
        <div class="alumno">
            👤 <strong>${a.nombre || 'Desconocido'}</strong><br>
            👥 Grupo: ${a.grupo || '-'}<br>
            ⏱ Permanencia: ${tiempoFormateado}<br>
            🚫 Salidas del Aula: ${a.salidas || 0}<br>
            📌 Entrada: ${tardanzaFormateada}<br>
            Desempeño: <strong>${a.estado || "Sin evaluar"}</strong><br><br>

            <div style="display: flex; gap: 5px; justify-content: space-between;">
                <button onclick="setEstado('${a.id}','😄 Excelente')">😄</button>
                <button onclick="setEstado('${a.id}','👍 Bien')">👍</button>
                <button onclick="setEstado('${a.id}','😐 Regular')">😐</button>
                <button onclick="setEstado('${a.id}','❌ No trabajó')">❌</button>
            </div>
        </div>
        `;
    }).join('');

    contenedor.innerHTML = fragmento;
}

// ✅ EXPORTACIÓN CSV REPARADA PARA EXCEL (Soporte UTF-8 y delimitador nativo)
async function exportarCSV(){
    const snap = await db.collection("clases").doc("activa").collection("alumnos").get();
    
    if(snap.empty) {
        alert("No hay alumnos registrados para exportar.");
        return;
    }

    // El BOM permite que Excel identifique correctamente los acentos y la Ñ
    let contenido = "\uFEFF"; 
    // Encabezados usando punto y coma (delimitador estándar regional europeo/latino de Excel)
    contenido += "Nombre;Grupo;Tiempo Permanencia;Salidas;Evaluación Trabajo;Tiempo de Retardo\n";

    snap.forEach(doc => {
        const a = doc.data();
        const t = Math.floor((a.tiempo || 0) / 1000);
        const tiempo = `${Math.floor(t / 60)}m ${t % 60}s`;

        const tard = Math.floor((a.tardanza || 0) / 1000);
        const tardanza = tard < 60 ? "A tiempo" : `${Math.floor(tard / 60)}m ${tard % 60}s`;

        contenido += `"${a.nombre || ''}";"${a.grupo || ''}";"${tiempo}";${a.salidas || 0};"${a.estado || ''}";"${tardanza}"\n`;
    });
