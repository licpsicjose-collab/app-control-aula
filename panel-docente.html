<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Docente</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding-top: 30px;
}

input, button {
    padding: 10px;
    margin: 5px;
}

.alumno {
    border: 1px solid #ccc;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}
</style>

</head>

<body>

<h1>Panel Docente</h1>

<input id="escuela" placeholder="Escuela"><br>
<input id="grupo" placeholder="Grupo"><br>
<input id="materia" placeholder="Materia"><br><br>

<button onclick="iniciarClase()">Iniciar Clase</button>
<button onclick="finalizarClase()">Finalizar Clase</button>
<button onclick="exportarCSV()">Exportar a Excel</button>

<h2>Buscar alumno</h2>
<input id="busqueda" placeholder="Nombre..." onkeyup="filtrar()">

<h2>Alumnos</h2>
<div id="alumnos"></div>

<hr>

<h2>Historial</h2>
<div id="historial"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

let listaAlumnos = [];

// ===== GENERAR CODIGO =====
function generarCodigo() {
    return Math.random().toString(36).substring(2,6).toUpperCase();
}

// ===== INICIAR CLASE =====
function iniciarClase() {

    let clase = {
        codigo: generarCodigo(),
        inicio: Date.now()
    };

    db.collection("clases").doc("activa").set(clase);
}

// ===== FINALIZAR =====
async function finalizarClase() {

    let snap = await db.collection("clases")
        .doc("activa")
        .collection("alumnos")
        .get();

    let alumnos = [];

    snap.forEach(doc => alumnos.push(doc.data()));

    await db.collection("historial").add({
        alumnos: alumnos,
        fin: Date.now()
    });

    await db.collection("clases").doc("activa").delete();

    alert("Clase finalizada");
}

// ===== EXPORTAR =====
async function exportarCSV() {

    let snap = await db.collection("clases")
        .doc("activa")
        .collection("alumnos")
        .get();

    let contenido = "Nombre,Grupo,Tiempo,Salidas,Estado\n";

    snap.forEach(doc => {

        let a = doc.data();

        let tiempoTotal = Math.floor((a.tiempo || 0)/1000);
        let min = Math.floor(tiempoTotal / 60);
        let seg = tiempoTotal % 60;

        let tiempo = min > 0 ? `${min}m ${seg}s` : `${seg}s`;

        contenido += `${a.nombre},${a.grupo},${tiempo},${a.salidas || 0},${a.estado || ""}\n`;
    });

    let blob = new Blob([contenido], {type: "text/csv"});
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "reporte.csv";
    link.click();
}

// ===== GUARDAR ESTADO =====
function setEstado(nombre, valor) {

    db.collection("clases")
    .doc("activa")
    .collection("alumnos")
    .doc(nombre)
    .update({
        estado: valor
    });
}

// ===== MOSTRAR =====
db.collection("clases")
.doc("activa")
.collection("alumnos")
.onSnapshot(snap => {

    listaAlumnos = [];

    snap.forEach(doc => {
        listaAlumnos.push(doc.data());
    });

    render(listaAlumnos);
});

// ===== FILTRO =====
function filtrar() {
    let texto = document.getElementById("busqueda").value.toLowerCase();

    let filtrados = listaAlumnos.filter(a =>
        a.nombre.toLowerCase().includes(texto)
    );

    render(filtrados);
}

// ===== RENDER =====
function render(lista) {

    let html = "";
