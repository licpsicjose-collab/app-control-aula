<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding-top: 50px;
}
input, select, button {
    padding: 10px;
    margin: 5px;
}
</style>

</head>

<body>

<h1>Login</h1>

<select id="tipo">
    <option value="">Selecciona tipo</option>
    <option value="docente">Docente</option>
    <option value="alumno">Alumno</option>
</select><br>

<input id="usuario" placeholder="Usuario"><br>
<input id="password" type="password" placeholder="Contraseña"><br>

<button onclick="login()">Entrar</button>

<script>

function login() {

    let tipo = document.getElementById("tipo").value;
    let usuario = document.getElementById("usuario").value.trim();
    let password = document.getElementById("password").value;

    if (!tipo || !usuario || !password) {
        alert("Completa todos los campos");
        return;
    }

    // ===== DOCENTE =====
    if (tipo === "docente") {

        let docentes = JSON.parse(localStorage.getItem("docentes")) || [];

        let encontrado = docentes.find(d => 
            d.correo === usuario.toLowerCase() &&
            d.password === password
        );

        if (encontrado) {

            localStorage.setItem("sesion", JSON.stringify({
                tipo: "docente",
                usuario: encontrado
            }));

            window.location.href = "panel-docente.html";
            return;

        } else {
            alert("Datos de docente incorrectos");
            return;
        }
    }

    // ===== ALUMNO =====
    if (tipo === "alumno") {

        let alumnos = JSON.parse(localStorage.getItem("alumnos")) || [];

        let encontrado = alumnos.find(a =>
            a.nombre === usuario &&
            a.password === password
        );

        if (encontrado) {

            localStorage.setItem("sesion", JSON.stringify({
                tipo: "alumno",
                usuario: encontrado
            }));

            window.location.href = "panel-alumno.html";
            return;

        } else {
            alert("Datos de alumno incorrectos");
            return;
        }
    }
}

</script>

</body>
</html>
