<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Docente</title>

<style>
body {
    font-family: Arial;
    text-align: center;
}

input, button {
    padding: 10px;
    margin: 5px;
}

.alumno {
    border: 1px solid #ccc;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}
</style>

</head>

<body>

<h1>Panel Docente</h1>

<input id="escuela" placeholder="Escuela"><br>
<input id="grupo" placeholder="Grupo"><br>
<input id="materia" placeholder="Materia"><br><br>

<button onclick="iniciarClase()">Iniciar Clase</button>

<h2>Clase Activa</h2>
<div id="clase"></div>

<h2>Alumnos</h2>
<div id="alumnos"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

// ✅ INICIAR CLASE
function iniciarClase(){

    let clase = {
        escuela: document.getElementById("escuela").value,
        grupo: document.getElementById("grupo").value,
        materia: document.getElementById("materia").value,
        codigo: Math.random().toString(36).substring(2,6).toUpperCase(),
        inicio: Date.now()
    };

    db.collection("clases").doc("activa").set(clase);
}

// ✅ MOSTRAR CLASE
db.collection("clases").doc("activa")
.onSnapshot(doc => {

    let c = doc.data();

    if (!c){
        document.getElementById("clase").innerHTML = "Sin clase";
        return;
    }

    document.getElementById("clase").innerHTML = `
        ${c.escuela}<br>
        ${c.grupo}<br>
        ${c.materia}<br>
        🔑 ${c.codigo}
    `;
});

// ✅ ALUMNOS
db.collection("clases").doc("activa")
.collection("alumnos")
.onSnapshot(snap => {

    let html = "";

    snap.forEach(doc => {

        let a = doc.data();

        html += `
        <div class="alumno">
            ${a.nombre}<br>
            ⏱ ${Math.floor((a.tiempo||0)/1000)}s<br>
            🚫 ${a.salidas||0}
        </div>`;
    });

    document.getElementById("alumnos").innerHTML = html;
});

</script>

</body>
</html>
