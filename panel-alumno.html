<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alumno</title>
</head>

<body>

<h1>Entrar a Clase</h1>

<input id="nombre" placeholder="Nombre"><br>
<input id="escuela" placeholder="Escuela"><br>
<input id="grupo" placeholder="Grupo"><br><br>

<input id="codigo" placeholder="Código"><br><br>

<button onclick="ingresar()">Entrar</button>

<h2 id="estado"></h2>

<!-- ✅ FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.jsscript>
<script src="firebase.js"></script>

<script>

let claseActual = null;

// ✅ ESCUCHAR CLASE
db.collection("clases").doc("activa")
.onSnapshot((doc) => {
    claseActual = doc.data();
});

function ingresar() {

    let nombre = document.getElementById("nombre").value;
    let escuela = document.getElementById("escuela").value;
    let grupo = document.getElementById("grupo").value;
    let codigo = document.getElementById("codigo").value;

    if (!claseActual) {
        alert("No hay clase activa");
        return;
    }

    if (codigo !== claseActual.codigo) {
        alert("Código incorrecto");
        return;
    }

    if (!nombre || !escuela || !grupo) {
        alert("Completa tus datos");
        return;
    }

    // ✅ GUARDAR SIEMPRE (SIN depender de localStorage)
    db.collection("clases")
    .doc("activa")
    .collection("alumnos")
    .doc(nombre)
    .set({
        nombre,
        grupo,
        escuela,
        horaEntrada: Date.now()
    });

    document.getElementById("estado").innerText = "✅ Entraste correctamente";

}

</script>

</body>
</html>
