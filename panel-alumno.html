<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zona de Clase - Alumno</title>

<!-- ✅ V7.4 — PWA: manifest, favicon e íconos (no afecta lógica ni Firebase) -->
<link rel="manifest" href="manifest-alumno.json">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180.png">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zona de Clase">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #000000;
    color: #ffffff;
    overflow: hidden;
}

.pantalla-login {
    background: #111827;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
}

.form-box {
    background: #1f2937;
    padding: 30px;
    border-radius: 12px;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.form-box h2 {
    margin-top: 0;
    margin-bottom: 20px;
    text-align: center;
    color: #3b82f6;
    font-size: 22px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border: 1px solid #4b5563;
    border-radius: 6px;
    background: #374151;
    color: white;
    font-size: 16px;
    box-sizing: border-box;
}

input:focus {
    outline: none;
    border-color: #3b82f6;
}

button {
    width: 100%;
    padding: 14px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
}

button:hover {
    background: #2563eb;
}

/* Pantalla de bloqueo en clase */
.pantalla-clase {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

.parpadeo {
    font-size: 50px;
    animation: blink 1.5s infinite;
    margin: 20px 0;
}

.marcador-estrellas {
    font-size: 24px;
    background: #1e1b4b;
    border: 2px solid #4338ca;
    padding: 10px 20px;
    border-radius: 50px;
    margin-top: 20px;
    color: #f59e0b;
    font-weight: bold;
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.2; }
    100% { opacity: 1; }
}

/* ✅ MEJORA 2: Pantalla visible cuando la clase está pausada */
.pantalla-pausada {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

.pantalla-pausada h2 {
    color: #f59e0b;
    font-size: 30px;
    margin: 0 0 10px 0;
}

.icono-pausa {
    font-size: 50px;
    margin: 10px 0;
}

/* ✅ MEJORA 7: Evaluación visible para el alumno */
.marcador-evaluacion {
    font-size: 22px;
    background: #1e1b4b;
    border: 2px solid #4338ca;
    padding: 10px 20px;
    border-radius: 50px;
    margin-top: 14px;
    color: #ffffff;
    font-weight: bold;
}

/* ✅ V8 — ONBOARDING ALUMNO: overlay de fondo (todos los pasos son centrados, ningún elemento a resaltar) */
.guia-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    z-index: 9998;
    display: none;
}

.guia-tarjeta {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 9999;
    background: #1f2937;
    color: #ffffff;
    border-radius: 14px;
    padding: 22px 22px;
    max-width: min(360px, 90vw);
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    display: none;
}
.guia-tarjeta h3 {
    margin: 0 0 10px 0;
    color: #60a5fa;
    font-size: 18px;
}
.guia-tarjeta p {
    font-size: 14px;
    line-height: 1.5;
    color: #e5e7eb;
    margin: 0 0 10px 0;
}
.guia-tarjeta ul {
    list-style: none;
    padding: 0;
    margin: 0 0 12px 0;
}
.guia-tarjeta ul li {
    font-size: 13px;
    color: #e5e7eb;
    margin-bottom: 6px;
}
.guia-progreso {
    font-size: 12px;
    color: #9ca3af;
    margin-bottom: 10px;
}
.guia-acciones {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 6px;
}
.guia-acciones button {
    padding: 8px 12px;
    font-size: 13px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
}
.guia-btn-omitir { background: none; color: #9ca3af; }
.guia-btn-anterior { background: #374151; color: #e5e7eb; }
.guia-btn-siguiente { background: #3b82f6; color: white; }

@media (max-width: 480px) {
    .guia-tarjeta { padding: 16px; }
}
</style>
</head>
<body>

<div id="vista-app">
    </div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>
let clase = null;
let enClase = false;

let inicio = 0;
let tiempoFuera = 0;
let salidas = 0;
let salidaInicio = 0;

let nombreAlumno = "";
let grupoAlumno = "";
let documentoAlumnoId = "";
let targetDocenteUid = "";
let unsubscribeClaseAlumno = null;
let unsubscribeEstrellas = null;
let pausadaAnterior = false; // ✅ MEJORA 2: control para detectar transición de pausa

// Pintar formulario inicial
mostrarFormulario();

// ✅ REENGANCHE AUTOMÁTICO: Revisa si el alumno ya estaba en clase activa antes de que se apagara el cel
comprobarSesionExistente();

function mostrarFormulario() {
    document.getElementById("vista-app").innerHTML = `
        <div class="pantalla-login">
            <div class="form-box">
                <h2>Entrar a Clase</h2>
                <input id="idDocente" placeholder="Código Docente (5 letras)">
                <input id="nombre" placeholder="Tu Nombre Completo">
                <div style="font-size:12px; color:#9ca3af; margin:-6px 0 12px 2px;">
                    Formato sugerido: No. Lista + Primer Apellido + Nombre(s)<br>
                    Ej. 05 Perez Juan, 12 Garcia Maria Fernanda
                </div>
                <input id="grupo" placeholder="Tu Grupo (Ej: 3-A)">
                <input id="codigo" placeholder="Código de Acceso de la Sesión">
                <button onclick="entrar()">Conectar</button>
                <p style="margin-top:14px; font-size:12px;">
                    <a href="#" onclick="iniciarGuiaAlumno(true); return false;" style="color:#60a5fa; text-decoration:underline;">
                        ❓ Ver guía nuevamente
                    </a>
                </p>
            </div>
        </div>
    `;
}

function comprobarSesionExistente() {
    let sesionGuardada = localStorage.getItem("sesion_clase_activa");
    if (sesionGuardada) {
        let datos = JSON.parse(sesionGuardada);
        // Verificar si la clase sigue existiendo en el servidor de manera fresca
        db.collection("clases").doc(datos.targetId).get({ source: "server" })
        .then(doc => {
            if (doc.exists) {
                // Sigue activa, reconectar de inmediato
                targetDocenteUid = datos.targetId;
                nombreAlumno = datos.nombre;
                grupoAlumno = datos.grupo;
                documentoAlumnoId = datos.docId;
                inicio = datos.inicio;
                tiempoFuera = datos.tiempoFuera || 0;
                salidas = datos.salidas || 0;
                enClase = true;

                activarPantallaBloqueo();
                escucharClaseMaestro(targetDocenteUid);
                escucharEstrellasTiempoReal();
            } else {
                // La clase ya caducó en el servidor, limpiar memoria
                localStorage.removeItem("sesion_clase_activa");
            }
        }).catch(() => {
            localStorage.removeItem("sesion_clase_activa");
        });
    }
}

function escucharClaseMaestro(docenteId) {
    if(unsubscribeClaseAlumno) unsubscribeClaseAlumno();

    unsubscribeClaseAlumno = db.collection("clases").doc(docenteId)
    .onSnapshot(doc => {
        let data = doc.data();
        if (!data && enClase) {
            enClase = false;
            reportarAFirebase();
            localStorage.removeItem("sesion_clase_activa");
            if(unsubscribeEstrellas) unsubscribeEstrellas();
            
            document.getElementById("vista-app").innerHTML = `
                <div class="pantalla-clase">
                    <h2>✅ Clase Finalizada</h2>
                    <p style="color: #9ca3af;">El profesor ha cerrado la sesión. Tus métricas se guardaron.</p>
                </div>
            `;
            return;
        }
        clase = data;

        // ✅ MEJORA 2: Alternar pantalla de pausa solo cuando cambia el estado
        if (enClase) {
            let pausadaActual = !!data?.pausada;
            if (pausadaActual !== pausadaAnterior) {
                pausadaAnterior = pausadaActual;
                if (pausadaActual) {
                    activarPantallaPausa();
                } else {
                    activarPantallaBloqueo();
                    escucharEstrellasTiempoReal();
                }
            }
        }
    });
}

// ✅ SECCIÓN 8: Escuchar las estrellas del alumno en tiempo real sin gastar más datos
function escucharEstrellasTiempoReal() {
    if(unsubscribeEstrellas) unsubscribeEstrellas();
    
    unsubscribeEstrellas = db.collection("clases").doc(targetDocenteUid)
    .collection("alumnos").doc(documentoAlumnoId)
    .onSnapshot(doc => {
        let data = doc.data();
        if(data) {
            let numEstrellas = data.participaciones || 0;
            let estrellasVisuales = "⭐".repeat(numEstrellas) || "Ninguna aún";
            let el = document.getElementById("contador-estrellas-visual");
            if(el) {
                el.innerHTML = `Mis Participaciones:<br><span style="font-size:28px;">${estrellasVisuales}</span>`;
            }

            // ✅ MEJORA 7: Actualiza evaluación en tiempo real
            let elEval = document.getElementById("evaluacion-visual");
            if(elEval) {
                elEval.innerHTML = textoEvaluacion(data.estado);
            }
        }
    });
}

async function entrar(){
    let codigoCorto = document.getElementById("idDocente").value.trim().toUpperCase();
    let n = document.getElementById("nombre").value.trim();
    let g = document.getElementById("grupo").value.trim();
    let c = document.getElementById("codigo").value.trim();

    if(!codigoCorto || !n || !g || !c) {
        alert("Por favor completa todos los campos.");
        return;
    }

    // ✅ SOLUCIÓN iPHONE: Forzar petición limpia al servidor saltándose la caché agresiva
    try {
        let mapeoRef = await db.collection("mapeo_codigos").doc(codigoCorto).get({ source: "server" });
        if(!mapeoRef.exists) {
            alert("El Código Docente no es válido.");
            return;
        }

        let targetId = mapeoRef.data().docenteUid;
        let docRef = await db.collection("clases").doc(targetId).get({ source: "server" });
        let claseData = docRef.data();

        if (!claseData){
            alert("El docente no tiene ninguna clase activa en este momento.");
            return;
        }

        // ✅ MEJORA 1: Retardos reales. En modo normal solo vale el código normal;
        // en modo retardo solo vale el código de retardo.
        let modoActual = claseData.modo || "normal";
        let valido = (modoActual === "retardo")
            ? (c === claseData.codigoRetardo)
            : (c === claseData.codigoInicial);
        if (!valido){
            alert("Código de acceso de sesión incorrecto.");
            return;
        }

        targetDocenteUid = targetId;
        clase = claseData;
        
        enClase = true;
        inicio = Date.now();
        nombreAlumno = n;
        grupoAlumno = g;
        
        // ✅ CONTROL ANTI-DUPLICADOS: Combina Nombre y Grupo en el ID de documento
        documentoAlumnoId = `${n}_${g}`.replace(/\s+/g, '_'); 

        let tardanza = Date.now() - clase.inicio;

        // Guardar estado local para prevenir cierres por botón de suspensión
        localStorage.setItem("sesion_clase_activa", JSON.stringify({
            targetId: targetDocenteUid,
            nombre: n,
            grupo: g,
            docId: documentoAlumnoId,
            inicio: inicio
        }));

        activarPantallaBloqueo();
        escucharClaseMaestro(targetDocenteUid);
        escucharEstrellasTiempoReal();

        // Registro de entrada inicial
        db.collection("clases")
        .doc(targetDocenteUid)
        .collection("alumnos")
        .doc(documentoAlumnoId)
        .set({
            nombre: n,
            grupo: g,
            tiempo: 0,
            tiempoFuera: 0,
            salidas: 0,
            participaciones: 0,
            tardanza: tardanza,
            retardoManual: (c === clase.codigoRetardo),
            ultimaActualizacion: Date.now()
        });

    } catch(err) {
        alert("Error de conexión. Revisa tus datos móviles.");
    }
}

// ✅ MEJORA 2: Pantalla visible de "CLASE PAUSADA"
function activarPantallaPausa() {
    document.getElementById("vista-app").innerHTML = `
        <div class="pantalla-pausada">
            <div class="icono-pausa">⏸️</div>
            <h2>CLASE PAUSADA</h2>
            <p style="color:#9ca3af; font-size:14px;">El profesor pausó la sesión. No se está contando tiempo ni salidas.</p>
        </div>
    `;
}

function activarPantallaBloqueo() {
    document.getElementById("vista-app").innerHTML = `
        <div class="pantalla-clase">
            <h2 style="color:#ef4444; margin:0;">📵 Modo de Atención Activo</h2>
            <p style="color:#9ca3af; font-size:14px;">No salgas de esta pantalla ni bloquees el teléfono</p>
            <div class="parpadeo">🔴</div>
            <div id="contador-estrellas-visual" class="marcador-estrellas">
                Mis Participaciones:<br>Ninguna aún
            </div>
            <div id="evaluacion-visual" class="marcador-evaluacion">
                Sin evaluación
            </div>
        </div>
    `;
}

// ✅ MITIGACIÓN XSS (V7.3): escapa el valor antes de insertarlo como HTML,
// por si "estado" llegara a contener marcado o script (defensa en profundidad,
// aunque hoy el docente solo asigna uno de 4 valores fijos).
function escaparHTML(texto) {
    if (texto === undefined || texto === null) return "";
    return String(texto)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

// ✅ MEJORA 7: El campo "estado" ya se guarda con emoji y texto (ej. "😄 Excelente")
function textoEvaluacion(estado) {
    return estado ? escaparHTML(estado) : "Sin evaluación";
}

function reportarAFirebase() {
    if (!enClase || !targetDocenteUid) return;

    let tiempoTotal = Date.now() - inicio;
    let tiempoEnApp = tiempoTotal - tiempoFuera;

    if (clase?.pausada){
        tiempoEnApp = tiempoTotal;
    }

    db.collection("clases")
    .doc(targetDocenteUid)
    .collection("alumnos")
    .doc(documentoAlumnoId)
    .update({
        tiempo: tiempoEnApp,
        tiempoFuera: tiempoFuera,
        salidas: salidas,
        ultimaActualizacion: Date.now()
    }).catch(() => {});
}

// ===== DETECCIONES MEJORADAS (ANTI-FALSOS POSITIVOS DE 45 SEG) =====
window.addEventListener("blur", () => {
    if (!enClase || clase?.pausada) return;
    salidaInicio = Date.now();
});

window.addEventListener("focus", () => {
    if (!enClase || !salidaInicio) return;
    let tiempoSalida = Date.now() - salidaInicio;
    
    // ✅ TOLERANCIA PEDAGÓGICA: Solo penaliza si estuvo fuera más de 5 segundos reales
    if (tiempoSalida > 5000){
        salidas++;
        tiempoFuera += tiempoSalida;
        reportarAFirebase();
    }
    salidaInicio = 0;
});

document.addEventListener("visibilitychange", () => {
    if (!enClase || clase?.pausada) return;

    if (document.visibilityState === "hidden") {
        salidaInicio = Date.now();
    } else {
        if (!salidaInicio) return;
        let tiempoSalida = Date.now() - salidaInicio;
        
        if (tiempoSalida > 5000){
            salidas++;
            tiempoFuera += tiempoSalida;
            reportarAFirebase();
        }
        salidaInicio = 0;
    }
});

// Respaldo preventivo lento cada 60 segundos (Ahorro radical de batería y dinero)
setInterval(() => {
    if(enClase && salidaInicio === 0) {
        reportarAFirebase();
    }
}, 60000);

// ============================================================
// ✅ V8 — ONBOARDING INTERACTIVO PARA ALUMNOS
// No modifica Firebase, Firestore, reglas, participaciones,
// evaluaciones, historial, exportación ni ninguna función de
// negocio existente. Solo lee/escribe "tutorialAlumnoVisto" en
// localStorage (independiente de "sesion_clase_activa").
// ============================================================

const pasosGuiaAlumno = [
    {
        titulo: "👋 Bienvenido a Control de Aula",
        mensajeHTML: "<p>Esta herramienta apoya las actividades académicas propuestas por tu docente durante la sesión de clase.</p>"
    },
    {
        titulo: "🔒 Privacidad y funcionamiento",
        mensajeHTML: `
            <p><strong>Control de Aula:</strong></p>
            <ul>
                <li>✅ No solicita permisos especiales.</li>
                <li>✅ No accede a fotografías.</li>
                <li>✅ No accede a contactos.</li>
                <li>✅ No accede a llamadas.</li>
                <li>✅ No accede a mensajes.</li>
                <li>✅ No accede a la ubicación GPS.</li>
                <li>✅ No modifica configuraciones del dispositivo.</li>
                <li>✅ Funciona únicamente mediante las capacidades normales del navegador.</li>
            </ul>
        `
    },
    {
        titulo: "📚 Uso académico del dispositivo",
        mensajeHTML: `
            <p>La herramienta ayuda a promover el uso académico del dispositivo durante actividades de aprendizaje.</p>
            <p>Puede ayudar a identificar interrupciones relacionadas con actividades ajenas a la sesión académica cuando así lo determine el docente.</p>
            <p>La plataforma no fue diseñada como una herramienta de vigilancia.</p>
        `
    },
    {
        titulo: "📝 Datos para ingresar",
        mensajeHTML: `
            <p>Para entrar a una actividad necesitarás:</p>
            <ul>
                <li>✅ Código Docente</li>
                <li>✅ Nombre</li>
                <li>✅ Grupo</li>
                <li>✅ Código de Acceso</li>
            </ul>
        `
    },
    {
        titulo: "✅ Todo listo",
        mensajeHTML: `
            <p>Ya puedes comenzar tu actividad.</p>
            <p>Si la clase continúa activa, tu sesión podrá recuperarse automáticamente en caso de cierre accidental del navegador.</p>
        `
    }
];

let pasoActualGuiaAlumno = 0;

// Punto de entrada: automático la primera vez, o manual desde "❓ Ver guía nuevamente"
// (forzado=true no altera localStorage).
function iniciarGuiaAlumno(forzado) {
    if (!forzado && localStorage.getItem("tutorialAlumnoVisto") === "true") return;
    pasoActualGuiaAlumno = 0;
    document.getElementById("guia-overlay").style.display = "block";
    mostrarPasoGuiaAlumno(0);
}

function mostrarPasoGuiaAlumno(indice) {
    let paso = pasosGuiaAlumno[indice];
    document.getElementById("guia-overlay").style.display = "block";
    document.getElementById("guia-tarjeta").style.display = "block";
    document.getElementById("guia-progreso").innerText = `Paso ${indice + 1} de ${pasosGuiaAlumno.length}`;
    document.getElementById("guia-titulo").innerText = paso.titulo;
    document.getElementById("guia-mensaje").innerHTML = paso.mensajeHTML; // contenido fijo definido arriba, no proviene del usuario
    document.getElementById("guia-btn-anterior").style.display = (indice === 0) ? "none" : "inline-block";
    document.getElementById("guia-btn-siguiente").innerText = (indice === pasosGuiaAlumno.length - 1) ? "Finalizar" : "Siguiente";
}

function siguientePasoGuiaAlumno() {
    if (pasoActualGuiaAlumno >= pasosGuiaAlumno.length - 1) {
        finalizarGuiaAlumno();
        return;
    }
    pasoActualGuiaAlumno++;
    mostrarPasoGuiaAlumno(pasoActualGuiaAlumno);
}

function pasoAnteriorGuiaAlumno() {
    if (pasoActualGuiaAlumno === 0) return;
    pasoActualGuiaAlumno--;
    mostrarPasoGuiaAlumno(pasoActualGuiaAlumno);
}

function omitirGuiaAlumno() {
    cerrarGuiaAlumno();
    localStorage.setItem("tutorialAlumnoVisto", "true");
}

function finalizarGuiaAlumno() {
    cerrarGuiaAlumno();
    localStorage.setItem("tutorialAlumnoVisto", "true");
}

function cerrarGuiaAlumno() {
    document.getElementById("guia-overlay").style.display = "none";
    document.getElementById("guia-tarjeta").style.display = "none";
}

// Disparo automático: solo la primera vez, tras cargar la pantalla de entrada.
setTimeout(() => iniciarGuiaAlumno(false), 500);
</script>
<!-- ✅ V8 — ONBOARDING ALUMNO: estructura de la guía interactiva (oculta por defecto) -->
<div class="guia-overlay" id="guia-overlay"></div>
<div class="guia-tarjeta" id="guia-tarjeta">
    <div class="guia-progreso" id="guia-progreso">Paso 1 de 5</div>
    <h3 id="guia-titulo">Título</h3>
    <div id="guia-mensaje">Mensaje</div>
    <div class="guia-acciones">
        <button class="guia-btn-omitir" onclick="omitirGuiaAlumno()">Omitir</button>
        <div>
            <button class="guia-btn-anterior" id="guia-btn-anterior" onclick="pasoAnteriorGuiaAlumno()">Anterior</button>
