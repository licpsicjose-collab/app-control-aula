<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Docente</title>
</head>

<body>

<h1>Panel Docente</h1>

<h2>Crear Clase</h2>

<input id="escuela" placeholder="Escuela"><br>
<input id="grupo" placeholder="Grupo"><br>
<input id="materia" placeholder="Materia"><br><br>

<button onclick="iniciarClase()">Iniciar Clase</button>

<h2>Clase Activa</h2>
<div id="clase"></div>

<h2>Alumnos</h2>
<div id="alumnos">Sin alumnos</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

// generar código
function generarCodigo() {
    return Math.random().toString(36).substring(2,6).toUpperCase();
}

// iniciar clase
function iniciarClase() {

    let escuela = document.getElementById("escuela").value;
    let grupo = document.getElementById("grupo").value;
    let materia = document.getElementById("materia").value;

    if (!escuela || !grupo || !materia) {
        alert("Completa todos los campos");
        return;
    }

    let clase = {
        escuela,
        grupo,
        materia,
        codigo: generarCodigo()
    };

    db.collection("clases").doc("activa").set(clase);
}

// escuchar clase
db.collection("clases").doc("activa")
.onSnapshot(doc => {

    let data = doc.data();
    if (!data) return;

    document.getElementById("clase").innerHTML =
        `${data.escuela} - ${data.grupo}<br>Código: ${data.codigo}`;
});

// escuchar alumnos
db.collection("clases").doc("activa")
.collection("alumnos")
.onSnapshot(snapshot => {

    let html = "";

    snapshot.forEach(doc => {
        let alumno = doc.data();
        html += `${alumno.nombre} - ${alumno.grupo}<br>`;
    });

    document.getElementById("alumnos").innerHTML = html || "Sin alumnos";
});

</script>

</body>
</html>
