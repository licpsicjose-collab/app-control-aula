<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acceso Docente</title>

<!-- ✅ V7.4 — PWA: manifest, favicon e íconos (no afecta lógica ni Firebase) -->
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180.png">
<meta name="theme-color" content="#1e3a8a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Control de Aula">

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f6f9;
    color: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.login-card {
    background: white;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    text-align: center;
    width: 100%;
    max-width: 360px;
}

h2 {
    color: #1e293b;
    margin-bottom: 24px;
    font-weight: 600;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    font-size: 14px;
    box-sizing: border-box;
    transition: border-color 0.2s;
}

input:focus {
    outline: none;
    border-color: #3b82f6;
}

.btn-container {
    display: flex;
    gap: 10px;
    margin-top: 16px;
}

button {
    flex: 1;
    padding: 12px;
    font-size: 14px;
    font-weight: 500;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-primary {
    background-color: #3b82f6;
    color: white;
}

.btn-primary:hover {
    background-color: #2563eb;
}

.btn-secondary {
    background-color: #f1f5f9;
    color: #475569;
}

.btn-secondary:hover {
    background-color: #e2e8f0;
}
</style>

</head>

<body>

<div class="login-card">
    <h2>Control de Aula</h2>
    <p style="color: #64748b; font-size: 14px; margin-bottom: 20px;">Acceso exclusivo para Docentes</p>
    
    <input id="correo" type="email" placeholder="Correo electrónico"><br>
    <input id="password" type="password" placeholder="Contraseña"><br><br>

    <div class="btn-container">
        <button class="btn-secondary" onclick="registrar()">Registrarse</button>
        <button class="btn-primary" onclick="entrar()">Entrar</button>
    </div>

    <p style="margin-top:16px; font-size:13px;">
        <a href="#" onclick="recuperarPassword(); return false;" style="color:#3b82f6; text-decoration:underline;">
            ¿Olvidaste tu contraseña?
        </a>
    </p>
    <p id="mensaje-recuperacion" style="font-size:13px; margin-top:4px;"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDRjBwW6nueplRNYL-S0sxfliC8taWNZCM",
  authDomain: "app-clase-3a564.firebaseapp.com",
  projectId: "app-clase-3a564"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// FUNCIÓN AUXILIAR PARA GENERAR CÓDIGO CORTO DE DOCENTE (5 CARACTERES)
function generarCodigoCortoDocente() {
    return Math.random().toString(36).substring(2,7).toUpperCase();
}

// ✅ REGISTRAR + ASIGNACIÓN AUTOMÁTICA DE CÓDIGO CORTO
async function registrar(){
    let c = document.getElementById("correo").value;
    let p = document.getElementById("password").value;

    if(!c || !p){
        alert("Completa los datos");
        return;
    }

    try {
        let userCredential = await auth.createUserWithEmailAndPassword(c, p);
        let uid = userCredential.user.uid;

        // Intentar asignar un código corto único de 5 dígitos
        let codigoAsignado = "";
        let esUnico = false;
        
        while (!esUnico) {
            let intentoCodigo = generarCodigoCortoDocente();
            let docRef = await db.collection("mapeo_codigos").doc(intentoCodigo).get();
            if (!docRef.exists) {
                codigoAsignado = intentoCodigo;
                esUnico = true;
            }
        }

        // Guardar el mapeo en Firestore
        await db.collection("mapeo_codigos").doc(codigoAsignado).set({
            docenteUid: uid,
            correo: c
        });

        alert("✅ Cuenta creada con éxito. Tu Código de Enlace Docente es: " + codigoAsignado);
        window.location.href = "panel-docente.html";

    } catch (e) {
        alert("❌ " + e.message);
    }
}

// ✅ LOGIN
function entrar(){
    let c = document.getElementById("correo").value;
    let p = document.getElementById("password").value;

    if(!c || !p){
        alert("Completa los datos");
        return;
    }

    auth.signInWithEmailAndPassword(c, p)
    .then(()=>{
        window.location.href = "panel-docente.html";
    })
    .catch(e=>{
        alert("❌ " + e.message);
    });
}

// ✅ RECUPERACIÓN DE CONTRASEÑA (V7.2) — usa exclusivamente Firebase Auth nativo,
// reutiliza el campo de correo ya existente en el formulario, sin backend propio.
function recuperarPassword(){
    let c = document.getElementById("correo").value.trim();
    let mensaje = document.getElementById("mensaje-recuperacion");

    if(!c){
        mensaje.style.color = "#b91c1c";
        mensaje.innerText = "Escribe tu correo electrónico arriba antes de continuar.";
        return;
    }

    auth.sendPasswordResetEmail(c)
    .then(() => {
        mensaje.style.color = "#15803d";
        mensaje.innerText = "Se ha enviado un correo para restablecer tu contraseña.";
    })
    .catch((e) => {
        mensaje.style.color = "#b91c1c";
        if (e.code === "auth/user-not-found") {
            mensaje.innerText = "El correo no está registrado.";
        } else if (e.code === "auth/invalid-email") {
            mensaje.innerText = "El formato del correo no es válido.";
        } else {
            mensaje.innerText = "❌ " + e.message;
        }
    });
}
</script>

</body>
</html>
