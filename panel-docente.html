<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Docente</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding-top: 30px;
}

input, button {
    padding: 10px;
    margin: 5px;
}

.alumno {
    border: 1px solid #ccc;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}
</style>

</head>

<body>

<h1>Panel Docente</h1>

<input id="escuela" placeholder="Escuela"><br>
<input id="grupo" placeholder="Grupo"><br>
<input id="materia" placeholder="Materia"><br><br>

<button onclick="iniciarClase()">Iniciar Clase</button>
<button onclick="exportarCSV()">Exportar Excel</button>

<h2>Clase</h2>
<div id="clase"></div>

<h2>Alumnos</h2>
<div id="alumnos"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

function generarCodigo() {
    return Math.random().toString(36).substring(2,6).toUpperCase();
}

function iniciarClase() {

    let escuela = document.getElementById("escuela").value;
    let grupo = document.getElementById("grupo").value;
    let materia = document.getElementById("materia").value;

    let clase = {
        escuela,
        grupo,
        materia,
        codigo: generarCodigo(),
        inicio: Date.now()
    };

    db.collection("clases").doc("activa").set(clase);
}

// VER CLASE
db.collection("clases").doc("activa")
.onSnapshot(doc => {

    let c = doc.data();
    if (!c) return;

    document.getElementById("clase").innerHTML =
        `${c.escuela} - ${c.grupo} - ${c.codigo}`;
});

// ALUMNOS
db.collection("clases").doc("activa")
.collection("alumnos")
.onSnapshot(snap => {

    let html = "";

    snap.forEach(doc => {

        let a = doc.data();

        // tiempo
        let t = Math.floor((a.tiempo || 0)/1000);
        let min = Math.floor(t/60);
        let seg = t % 60;

        let tiempo = min > 0 ? `${min}m ${seg}s` : `${seg}s`;

        // tardanza
        let tardanzaSeg = Math.floor((a.tardanza || 0)/1000);

        let tardanza;
        if (tardanzaSeg < 60) {
            tardanza = "✅ A tiempo";
        } else {
            let m = Math.floor(tardanzaSeg/60);
            let s = tardanzaSeg % 60;
            tardanza = `⏰ Tarde: ${m}m ${s}s`;
        }

        html += `
        <div class="alumno">
            👤 ${a.nombre}<br>
            ⏱ ${tiempo}<br>
            🚫 ${a.salidas || 0}<br>
            ${tardanza}
        </div>
        `;
    });

    document.getElementById("alumnos").innerHTML = html;
});

// EXPORTAR
async function exportarCSV() {

    let snap = await db.collection("clases")
        .doc("activa")
        .collection("alumnos")
        .get();

    let contenido = "Nombre,Tiempo,Salidas,Tardanza\n";

    snap.forEach(doc => {

        let a = doc.data();

        let t = Math.floor((a.tiempo || 0)/1000);
        let min = Math.floor(t/60);
        let seg = t%60;
        let tiempo = min > 0 ? `${min}m ${seg}s` : `${seg}s`;

        let tardanzaSeg = Math.floor((a.tardanza || 0)/1000);
        let tardanza = tardanzaSeg < 60 ? "A tiempo" :
            `${Math.floor(tardanzaSeg/60)}m ${tardanzaSeg%60}s`;

        contenido += `${a.nombre},${tiempo},${a.salidas || 0},${tardanza}\n`;
    });

    let blob = new Blob([contenido], {type:"text/csv"});
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "reporte.csv";
    link.click();
}

</script>

</body>
</html>
