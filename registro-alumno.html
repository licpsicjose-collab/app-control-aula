<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Alumno</title>
</head>

<body>

<h1>Registro Alumno</h1>

<input id="nombre" placeholder="Nombre"><br><br>
<input id="escuela" placeholder="Escuela"><br><br>
<input id="grupo" placeholder="Grupo"><br><br>
<input id="password" type="password" placeholder="Contraseña"><br><br>

<button onclick="registrar()">Registrarse</button>

<script>

function registrar() {

    let nombre = document.getElementById("nombre").value;
    let escuela = document.getElementById("escuela").value;
    let grupo = document.getElementById("grupo").value;
    let password = document.getElementById("password").value;

    if (!nombre || !escuela || !grupo || !password) {
        alert("Completa todos los campos");
        return;
    }

    // ✅ guardar local (solo sesión)
    let alumno = {
        nombre,
        escuela,
        grupo,
        password
    };

    localStorage.setItem("alumno", JSON.stringify(alumno));

    alert("Registro correcto ✅");

    window.location.href = "panel-alumno.html";
}

</script>

</body>
</html>
