<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alumno</title>
</head>

<body>

<h1>Entrar a clase</h1>

<input id="nombre" placeholder="Nombre"><br>
<input id="grupo" placeholder="Grupo"><br>
<input id="codigo" placeholder="Código"><br><br>

<button onclick="entrar()">Entrar</button>

<h2 id="estado"></h2>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

let claseActual;

// escuchar clase
db.collection("clases").doc("activa")
.onSnapshot(doc => {
    claseActual = doc.data();
});

// entrar a clase
function entrar() {

    let nombre = document.getElementById("nombre").value;
    let grupo = document.getElementById("grupo").value;
    let codigo = document.getElementById("codigo").value;

    if (!claseActual) {
        alert("No hay clase activa");
        return;
    }

    if (codigo !== claseActual.codigo) {
        alert("Código incorrecto");
        return;
    }

    db.collection("clases")
    .doc("activa")
    .collection("alumnos")
    .doc(nombre)
    .set({
        nombre,
        grupo
    });

    document.getElementById("estado").innerText = "✅ Entraste correctamente";
}

</script>

</body>
</html>
