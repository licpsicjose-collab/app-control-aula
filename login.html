<script src="firebase.js"></script>

<script>

function registrar(){

    console.log("Intentando registrar...");

    let c = document.getElementById("correo").value;
    let p = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(c, p)
    .then(() => {
        alert("✅ FUNCIONÓ");
    })
    .catch(e => {
        alert("❌ " + e.message);
        console.error(e);
    });
}

</script>
