<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Docente</title>
</head>

<body>

<h1>Panel Docente</h1>

<input id="escuela" placeholder="Escuela"><br>
<input id="grupo" placeholder="Grupo"><br>
<input id="materia" placeholder="Materia"><br><br>

<button onclick="iniciarClase()">Iniciar</button>

<h2>Clase</h2>
<div id="clase"></div>

<h2>Alumnos</h2>
<div id="alumnos"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase.js"></script>

<script>

let docenteId=null;

auth.onAuthStateChanged(user=>{
    if(user){
        docenteId=user.uid;
        cargarClase();
    }else{
        location.href="login.html";
    }
});

// INICIAR CLASE
function iniciarClase(){

    let clase={
        escuela:escuela.value,
        grupo:grupo.value,
        materia:materia.value,
        codigo:Math.random().toString(36).substring(2,6),
        inicio:Date.now()
    };

    db.collection("docentes")
    .doc(docenteId)
    .collection("claseActiva")
    .doc("activo")
    .set(clase);
}

// ESCUCHAR CLASE
function cargarClase(){

    db.collection("docentes")
    .doc(docenteId)
    .collection("claseActiva")
    .doc("activo")
    .onSnapshot(doc=>{

        let c=doc.data();

        if(!c){
            clase.innerText="Sin clase";
            return;
        }

        clase.innerHTML=`Código: ${c.codigo}`;

        escucharAlumnos();
    });
}

// LISTENER ALUMNOS
function escucharAlumnos(){

    db.collection("docentes")
    .doc(docenteId)
    .collection("claseActiva")
    .doc("activo")
    .collection("alumnos")
    .onSnapshot(snap=>{

        let html="";
        snap.forEach(doc=>{
            let a=doc.data();
            html+=`<div>${a.nombre}</div>`;
        });

        alumnos.innerHTML=html;
    });
}

</script>

</body>
</html>
