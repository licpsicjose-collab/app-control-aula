<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Docente</title>

<style>
body {
    font-family: Arial;
    text-align: center;
}

input, button {
    padding: 10px;
    margin: 5px;
}

.alumno {
    border: 1px solid #ccc;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}

.pausa {
    background-color: orange;
    color: white;
}

.reanudar {
    background-color: green;
    color: white;
}
</style>

</head>

<body>

<h1>Panel Docente</h1>

<input id="escuela" placeholder="Escuela"><br>
<input id="grupo" placeholder="Grupo"><br>
<input id="materia" placeholder="Materia"><br><br>

<button onclick="iniciarClase()">Iniciar Clase</button>
<button onclick="activarRetardo()">Modo Retardos</button>
<button onclick="exportarCSV()">Exportar Excel</button>
<button onclick="finalizarClase()">Finalizar Clase</button>
<button onclick="confirmarBorrado()">🗑 Borrar historial</button>

<h2>Clase Activa</h2>
<div id="clase"></div>

<div id="controlPausa"></div>

<h2>Buscar alumno</h2>
<input id="busqueda" placeholder="Nombre..." onkeyup="filtrar()">

<h2>Alumnos</h2>
<div id="alumnos"></div>

<hr>

<h2>Historial</h2>
<div id="historial"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

let lista = [];

// ===== GENERAR CÓDIGO =====
function generarCodigo(){
    return Math.random().toString(36).substring(2,6).toUpperCase();
}

// ===== INICIAR CLASE =====
function iniciarClase(){

    let clase = {
        escuela: escuela.value,
        grupo: grupo.value,
        materia: materia.value,
        codigoInicial: generarCodigo(),
        codigoRetardo: generarCodigo(),
        modo: "normal",
        pausada: false,
        inicio: Date.now()
    };

    db.collection("clases").doc("activa").set(clase);
}

// ===== ACTIVAR RETARDOS =====
function activarRetardo(){
    db.collection("clases").doc("activa").update({
        modo: "retardo"
    });
}

// ===== PAUSA =====
function togglePausa(){
    let ref = db.collection("clases").doc("activa");

    ref.get().then(doc=>{
        ref.update({
            pausada: !doc.data().pausada
        });
    });
}

// ===== MOSTRAR CLASE =====
db.collection("clases").doc("activa")
.onSnapshot(doc => {

    let c = doc.data();

    if (!c) {
        clase.innerHTML = "Sin clase activa";
        controlPausa.innerHTML = "";
        return;
    }

    let codigo = c.modo === "normal"
        ? c.codigoInicial
        : c.codigoRetardo;

    clase.innerHTML = `
        🏫 ${c.escuela}<br>
        👥 ${c.grupo}<br>
        📘 ${c.materia}<br>
        🔑 <strong>${codigo}</strong><br>
        ⚙️ ${c.modo}
    `;

    controlPausa.innerHTML = `
    <button class="${c.pausada?'reanudar':'pausa'}" onclick="togglePausa()">
        ${c.pausada ? "Reanudar ▶️" : "Pausar ⏸"}
    </button>
    `;
});

// ===== ALUMNOS =====
db.collection("clases").doc("activa")
.collection("alumnos")
.onSnapshot(snap=>{
    lista = [];
    snap.forEach(doc => lista.push(doc.data()));
    render(lista);
});

// ===== BUSCAR =====
function filtrar(){
    let texto = busqueda.value.toLowerCase();
    render(lista.filter(a => a.nombre.toLowerCase().includes(texto)));
}

// ===== ESTADO / RÚBRICA =====
function setEstado(nombre, estado){
    db.collection("clases")
    .doc("activa")
    .collection("alumnos")
    .doc(nombre)
    .update({ estado });
}

// ===== RENDER =====
function render(data){

    let html = "";

    data.forEach(a => {

        let t = Math.floor((a.tiempo || 0)/1000);
        let min = Math.floor(t/60);
        let seg = t % 60;

        let tiempo = min > 0 ? `${min}m ${seg}s` : `${seg}s`;

        let tardanzaSeg = Math.floor((a.tardanza || 0)/1000);

        let tardanza = tardanzaSeg < 60
            ? "✅ A tiempo"
            : `⏰ ${Math.floor(tardanzaSeg/60)}m ${tardanzaSeg%60}s`;

        html += `
        <div class="alumno">
            👤 ${a.nombre}<br>
            📚 ${a.grupo}<br>
            ⏱ ${tiempo}<br>
            🚫 ${a.salidas || 0}<br>
            ${tardanza}<br>
            Estado: ${a.estado || "-"}<br><br>

            <button onclick="setEstado('${a.nombre}','😄 Excelente')">😄</button>
            <button onclick="setEstado('${a.nombre}','👍 Bien')">👍</button>
            <button onclick="setEstado('${a.nombre}','😐 Regular')">😐</button>
            <button onclick="setEstado('${a.nombre}','❌ No trabajó')">❌</button>
        </div>
        `;
    });

    alumnos.innerHTML = html;
}

// ===== EXPORTAR =====
async function exportarCSV(){

    let snap = await db.collection("clases")
        .doc("activa")
        .collection("alumnos")
        .get();

    let contenido = "Nombre,Grupo,Tiempo,Salidas,Estado,Tardanza\n";

    snap.forEach(doc => {

        let a = doc.data();

        let t = Math.floor((a.tiempo||0)/1000);
        let min = Math.floor(t/60);
        let seg = t%60;

        let tiempo = min>0?`${min}m ${seg}s`:`${seg}s`;

        let tard = Math.floor((a.tardanza||0)/1000);

        let tardanza = tard<60
            ? "A tiempo"
            : `${Math.floor(tard/60)}m ${tard%60}s`;

        contenido += `${a.nombre},${a.grupo},${tiempo},${a.salidas||0},${a.estado||""},${tardanza}\n`;
    });

    let blob = new Blob([contenido], {type:"text/csv"});
    let link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = "reporte.csv";
    link.click();
}

// ===== FINALIZAR CLASE =====
async function finalizarClase(){

    let docClase = await db.collection("clases").doc("activa").get();
    let claseData = docClase.data();

    if (!claseData){
        alert("No hay clase");
        return;
    }

    let snap = await db.collection("clases")
        .doc("activa")
        .collection("alumnos")
        .get();

    let alumnosData = [];
    snap.forEach(doc => alumnosData.push(doc.data()));

    await db.collection("historial").add({
        ...claseData,
        alumnos: alumnosData,
        fin: Date.now()
    });

    await db.collection("clases").doc("activa").delete();

    alert("✅ Clase finalizada");
}

// ===== BORRADO SEGURO =====
async function confirmarBorrado(){

    let paso1 = confirm("⚠️ ¿Eliminar TODO el historial?");
    if (!paso1) return;

    let texto = prompt("Escribe BORRAR para confirmar:");

    if (texto !== "BORRAR") {
        alert("Cancelado ❌");
        return;
    }

    let snap = await db.collection("historial").get();
    let batch = db.batch();

    snap.forEach(doc => {
        batch.delete(doc.ref);
    });

    await batch.commit();

    alert("✅ Historial eliminado");
}

// ===== HISTORIAL =====
db.collection("historial").onSnapshot(snap => {

    let html = "";

    snap.forEach(() => {
        html += "<div>✅ Clase guardada</div>";
    });

    historial.innerHTML = html;
});

</script>

</body>
</html>
