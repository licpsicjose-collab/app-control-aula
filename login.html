<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Aula - Acceso Docente</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 400px;
            width: 90%;
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            color: #007bff;
            font-size: 26px;
            margin-bottom: 20px;
        }
        input, button {
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
            width: 100%;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #007bff;
            outline: none;
        }
        .btn-principal {
            background-color: #007bff;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-principal:hover { background-color: #0056b3; }
        .btn-secundario {
            background-color: #eef2f7;
            color: #495057;
            border: 1px solid #ced4da;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-secundario:hover { background-color: #e2e8f0; }
        .btn-volver {
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
            text-decoration: underline;
        }
        .btn-volver:hover { color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>👨‍🏫 Acceso Docente</h2>

    <input id="correo" type="email" placeholder="Correo Electrónico">
    <input id="password" type="password" placeholder="Contraseña"><br><br>

    <button class="btn-principal" onclick="entrar()">Iniciar Sesión</button>
    <button class="btn-secundario" onclick="registrar()">Registrarse como Docente</button>
    
    <button class="btn-volver" onclick="volver()">⬅ Volver al Inicio</button>
</div>

<!-- ✅ SDK DE FIREBASE CORRECTO (Modo Compatibilidad v9/v10) -->
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
// Variable global para controlar la autenticación
let auth = null;

// Configuración de tu proyecto en Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDRjBwW6nueplRNYL-S0sxfliC8taWNZCM",
  authDomain: "://firebaseapp.com",
  projectId: "app-clase-3a564",
  storageBucket: "://appspot.com",
  messagingSenderId: "206818130286",
  appId: "1:206818130286:web:d04f2ae584dfc3cb4e297f"
};

// 🔥 ESPERAR A QUE EL NAVEGADOR CARGUE LOS SCRIPTS EXTERNOS DE FIREBASE
window.onload = function() {
    if (typeof firebase !== 'undefined') {
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        auth = firebase.auth();
        console.log("🚀 Firebase Auth inicializado correctamente.");
    } else {
        console.error("❌ No se pudo conectar con los servidores de Firebase. Verifica tu conexión a internet.");
    }
};

// ✅ REGISTRAR NUEVO DOCENTE
function registrar(){
    if (!auth) { alert("⚠️ El sistema sigue conectándose a Firebase. Espera un segundo."); return; }

    const c = document.getElementById("correo").value.trim();
    const p = document.getElementById("password").value;

    if(!c || !p) {
        alert("⚠️ Por favor, llena ambos campos para registrarte.");
        return;
    }

    auth.createUserWithEmailAndPassword(c, p)
    .then(() => {
        alert("✅ Cuenta de docente creada con éxito. Ya puedes iniciar sesión.");
    })
    .catch(e => {
        alert("❌ Error de registro: " + e.message);
    });
}

// ✅ INICIAR SESIÓN (LOGIN)
function entrar(){
    if (!auth) { alert("⚠️ El sistema sigue conectándose a Firebase. Espera un segundo."); return; }

    const c = document.getElementById("correo").value.trim();
    const p = document.getElementById("password").value;

    if(!c || !p) {
        alert("⚠️ Por favor, escribe tu correo y contraseña.");
        return;
    }

    auth.signInWithEmailAndPassword(c, p)
    .then(() => {
        alert("🔒 Acceso concedido");
        window.location.href = "panel-docente.html";
    })
    .catch(e => {
        alert("❌ Error de acceso: " + e.message);
    });
}

// ✅ REGRESAR
function volver(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
