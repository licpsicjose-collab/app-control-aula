<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Docente</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding-top: 30px;
}

input, button {
    padding: 10px;
    margin: 5px;
}

.alumno {
    border: 1px solid #ccc;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}

.pausa {
    background-color: orange;
    color: white;
}

.reanudar {
    background-color: green;
    color: white;
}
</style>

</head>

<body>

<h1>Panel Docente</h1>

<input id="escuela" placeholder="Escuela"><br>
<input id="grupo" placeholder="Grupo"><br>
<input id="materia" placeholder="Materia"><br><br>

<button onclick="iniciarClase()">Iniciar Clase</button>
<button onclick="finalizarClase()">Finalizar Clase</button>

<h2>Clase Activa</h2>
<div id="clase"></div>

<div id="controlPausa"></div>

<h2>Alumnos</h2>
<div id="alumnos">Sin alumnos</div>

<hr>

<h2>Historial</h2>
<div id="historial"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

// ===== GENERAR CÓDIGO =====
function generarCodigo() {
    return Math.random().toString(36).substring(2,6).toUpperCase();
}

// ===== INICIAR CLASE =====
function iniciarClase() {

    let escuela = document.getElementById("escuela").value;
    let grupo = document.getElementById("grupo").value;
    let materia = document.getElementById("materia").value;

    let clase = {
        escuela,
        grupo,
        materia,
        codigo: generarCodigo(),
        pausada: false,
        inicio: Date.now()
    };

    db.collection("clases").doc("activa").set(clase);
}

// ===== PAUSA / REANUDAR =====
function togglePausa() {

    let ref = db.collection("clases").doc("activa");

    ref.get().then(doc => {
        let clase = doc.data();

        ref.update({
            pausada: !clase.pausada
        });
    });
}

// ===== FINALIZAR CLASE =====
async function finalizarClase() {

    let docClase = await db.collection("clases").doc("activa").get();
    let clase = docClase.data();

    if (!clase) {
        alert("No hay clase activa");
        return;
    }

    let snap = await db.collection("clases")
        .doc("activa")
        .collection("alumnos")
        .get();

    let alumnos = [];

    snap.forEach(doc => {
        alumnos.push(doc.data());
    });

    // guardar en historial
    await db.collection("historial").add({
        ...clase,
        alumnos: alumnos,
        fin: Date.now()
    });

    // eliminar clase activa
    await db.collection("clases").doc("activa").delete();

    alert("Clase finalizada ✅");
}

// ===== MOSTRAR CLASE + BOTÓN PAUSA =====
db.collection("clases").doc("activa")
.onSnapshot(doc => {

    let c = doc.data();

    if (!c) {
        document.getElementById("clase").innerHTML = "Sin clase activa";
        document.getElementById("controlPausa").innerHTML = "";
        return;
    }

    document.getElementById("clase").innerHTML = `
        🏫 ${c.escuela}<br>
        👥 ${c.grupo}<br>
        📘 ${c.materia}<br>
        🔑 ${c.codigo}
    `;

    let texto = c.pausada ? "Reanudar ▶️" : "Pausar ⏸";
    let claseBtn = c.pausada ? "reanudar" : "pausa";

    document.getElementById("controlPausa").innerHTML = `
        <button class="${claseBtn}" onclick="togglePausa()">
            ${texto}
        </button>
    `;
});

// ===== MOSTRAR ALUMNOS =====
db.collection("clases")
.doc("activa")
.collection("alumnos")
.onSnapshot(snapshot => {

    let html = "";

    snapshot.forEach(doc => {

        let a = doc.data();
        let tiempo = Math.floor((a.tiempo || 0)/1000);

        html += `
        <div class="alumno">
            👤 ${a.nombre}<br>
            📚 ${a.grupo}<br>
            ⏱ ${tiempo}s<br>
            🚫 ${a.salidas || 0}
        </div>
        `;
    });

    document.getElementById("alumnos").innerHTML = html || "Sin alumnos";
});

// ===== HISTORIAL =====
db.collection("historial")
.onSnapshot(snapshot => {

    let html = "";

    snapshot.forEach(doc => {

        let c = doc.data();

        html += `
        <div class="alumno">
            📘 ${c.materia} - ${c.grupo}<br>
            🏫 ${c.escuela}<br>
            ⏰ ${new Date(c.inicio).toLocaleString()}
        </div>
        `;
    });

    document.getElementById("historial").innerHTML = html || "Sin historial";
});

</script>

</body>
</html>
