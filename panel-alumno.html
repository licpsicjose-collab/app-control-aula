<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alumno</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

.pantalla {
    background: black;
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.parpadeo {
    font-size: 40px;
    animation: blink 1s infinite;
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
}
</style>

</head>

<body>

<!-- ✅ FORMULARIO ADAPTADO PARA MULTIUSUARIO -->
<div id="formulario">

<h2>Entrar a clase</h2>

<input id="idDocente" placeholder="ID de Enlace Docente"><br>
<input id="nombre" placeholder="Nombre completo"><br>
<input id="grupo" placeholder="Grupo"><br>
<input id="codigo" placeholder="Código de acceso a clase"><br><br>

<button onclick="entrar()">Entrar</button>

</div>

<!-- ✅ LIBRERÍAS DE FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

// ===== VARIABLES =====
let clase = null;
let enClase = false;

let inicio = 0;
let tiempoFuera = 0;
let salidas = 0;
let salidaInicio = 0;

let nombreAlumno = "";
let targetDocenteUid = ""; // ID del maestro al que se vincula este alumno
let unsubscribeClaseAlumno = null;

// ===== FUNCIÓN PARA ESCUCHAR LA CLASE ESPECÍFICA DEL MAESTRO =====
function escucharClaseMaestro(docenteId) {
    if(unsubscribeClaseAlumno) unsubscribeClaseAlumno();

    unsubscribeClaseAlumno = db.collection("clases").doc(docenteId)
    .onSnapshot(doc => {
        let data = doc.data();

        // ✅ si termina la clase
        if (!data && enClase) {
            enClase = false;
            document.body.innerHTML = `
                <div class="pantalla">
                    <h2>✅ Clase finalizada por el docente</h2>
                    <p>Puedes cerrar esta pantalla</p>
                </div>
            `;
            return;
        }
        clase = data;
    });
}

// ===== ENTRAR =====
async function entrar(){
    let targetId = document.getElementById("idDocente").value.trim();
    let n = document.getElementById("nombre").value.trim();
    let g = document.getElementById("grupo").value.trim();
    let c = document.getElementById("codigo").value.trim();

    if(!targetId || !n || !g || !c) {
        alert("Por favor llena todos los campos");
        return;
    }

    // Buscamos temporalmente la clase de ese maestro antes de validar
    let docRef = await db.collection("clases").doc(targetId).get();
    let claseData = docRef.data();

    if (!claseData){
        alert("El ID del docente es incorrecto o no tiene una clase activa actualmente.");
        return;
    }

    // ✅ DOBLE CÓDIGO VALIDACIÓN
    let valido =
        c === claseData.codigoInicial ||
        c === claseData.codigoRetardo;

    if (!valido){
        alert("Código de acceso incorrecto");
        return;
    }

    // Si pasa las validaciones, lo anclamos a ese maestro de por vida en esta sesión
    targetDocenteUid = targetId;
    clase = claseData;
    escucharClaseMaestro(targetDocenteUid);

    let tardanza = Date.now() - clase.inicio;

    enClase = true;
    inicio = Date.now();
    nombreAlumno = n;

    // ✅ PANTALLA ACTIVA (Tu interfaz original)
    document.body.innerHTML = `
        <div class="pantalla">
            <h2>📵 Estás en clase</h2>
            <p>No uses el teléfono</p>
            <div class="parpadeo">🔴</div>
        </div>
    `;

    // ✅ GUARDAR ALUMNO EN EL NODO PRIVADO DE SU MAESTRO
    db.collection("clases")
    .doc(targetDocenteUid)
    .collection("alumnos")
    .doc(n)
    .set({
        nombre: n,
        grupo: g,
        tiempo: 0,
        tiempoFuera: 0,
        salidas: 0,
        participaciones: 0,
        tardanza: tardanza,
        retardoManual: (c === clase.codigoRetardo)
    });
}

// ===== TU LÓGICA FILOSÓFICA AVANZADA (QUEDÓ TOTALMENTE INTACTA) =====

window.addEventListener("blur", () => {
    if (!enClase || clase?.pausada) return;
    salidas++;
    salidaInicio = Date.now();
});

window.addEventListener("focus", () => {
    if (!enClase) return;
    let tiempoSalida = Date.now() - salidaInicio;
    if (tiempoSalida > 20000){
        tiempoFuera += tiempoSalida;
    }
    salidaInicio = 0;
});

document.addEventListener("visibilitychange", () => {
    if (!enClase || clase?.pausada) return;

    if (document.visibilityState === "hidden") {
        salidas++;
        salidaInicio = Date.now();
    } else {
        let tiempoSalida = Date.now() - salidaInicio;
        if (tiempoSalida > 20000){
            tiempoFuera += tiempoSalida;
        }
        salidaInicio = 0;
    }
});

// ===== GUARDADO CONTINUO DINÁMICO =====
setInterval(() => {
    if (!enClase || !targetDocenteUid) return;

    let tiempoTotal = Date.now() - inicio;
    let tiempoEnApp = tiempoTotal - tiempoFuera;

    if (clase?.pausada){
        tiempoEnApp = tiempoTotal;
    }

    // Actualiza en el casillero exacto del docente asignado
    db.collection("clases")
    .doc(targetDocenteUid)
    .collection("alumnos")
    .doc(nombreAlumno)
    .update({
        tiempo: tiempoEnApp,
        tiempoFuera: tiempoFuera,
        salidas: salidas
    });

}, 5000);

</script>

</body>
</html>
